<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>City Badge</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#e8e4de;font:13px/1.5 'Outfit',system-ui,sans-serif;color:#1a1a1a;display:flex;flex-direction:column;align-items:center;padding:40px 20px;min-height:100vh}
h1{font-size:15px;font-weight:700;margin-bottom:24px;letter-spacing:.14em;text-transform:uppercase;color:#3a3028}
.search-row{display:flex;gap:8px;margin-bottom:20px;width:100%;max-width:440px}
.search-wrap{position:relative;flex:1}
input{width:100%;padding:10px 14px;border:2px solid #b0a898;border-radius:10px;font-size:14px;outline:none;background:#faf8f4;font-family:'Outfit',sans-serif}
input:focus{border-color:#7060a0}
button{padding:10px 22px;background:#2a2030;color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;letter-spacing:.06em;font-family:'Outfit',sans-serif}
button:hover{background:#1a1020}
button:disabled{opacity:.5;cursor:not-allowed}
#status{font-size:12px;color:#706050;margin-bottom:20px;min-height:18px}
#canvas-wrap{display:none;flex-direction:column;align-items:center;gap:16px}
canvas{display:block}
.dl-btn{padding:9px 28px;background:#2a2030;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;font-family:'Outfit',sans-serif}
.suggestions{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:#faf8f4;border:1.5px solid #b0a898;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.12);max-height:200px;overflow-y:auto;z-index:10}
.sug-item{padding:9px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid #ece8e0;font-family:'Outfit',sans-serif}
.sug-item:last-child{border-bottom:none}
.sug-item:hover{background:#f0ede8}
</style>
</head>
<body>
<h1>City Badge</h1>
<div class="search-row">
  <div class="search-wrap">
    <input id="city-input" type="text" placeholder="Tokyo, Paris, New York, Shanghai…" autocomplete="off">
    <div id="suggestions" class="suggestions" style="display:none"></div>
  </div>
  <button id="gen-btn">Make</button>
</div>
<div id="status"></div>
<div id="canvas-wrap">
  <canvas id="badge" width="520" height="640"></canvas>
  <button class="dl-btn" id="dl-btn">Download PNG</button>
</div>
<script>
var canvas = document.getElementById('badge');
var ctx = canvas.getContext('2d');
var W = 520, H = 640;
var cityInput = document.getElementById('city-input');
var sugBox = document.getElementById('suggestions');
var genBtn = document.getElementById('gen-btn');

// ── Autocomplete ──
var sugTimer = null;
cityInput.addEventListener('input', function() {
  clearTimeout(sugTimer);
  var q = this.value.trim();
  if (q.length < 2) { sugBox.style.display = 'none'; return; }
  sugTimer = setTimeout(function() { fetchSug(q); }, 380);
});
cityInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') go(); });
document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-wrap')) sugBox.style.display = 'none';
});

function fetchSug(q) {
  fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(q) + '&format=json&limit=5&featuretype=city', { headers: { 'Accept-Language': 'en' } })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    sugBox.innerHTML = '';
    if (!data.length) { sugBox.style.display = 'none'; return; }
    data.forEach(function(d) {
      var div = document.createElement('div');
      div.className = 'sug-item';
      div.textContent = d.display_name;
      div.addEventListener('click', function() {
        cityInput.value = d.display_name.split(',')[0];
        sugBox.style.display = 'none';
        go();
      });
      sugBox.appendChild(div);
    });
    sugBox.style.display = 'block';
  })
  .catch(function() { sugBox.style.display = 'none'; });
}

function setStatus(t) { document.getElementById('status').textContent = t; }

// ── Main fetch + render trigger ──
function go() {
  sugBox.style.display = 'none';
  var name = cityInput.value.trim();
  if (!name) { setStatus('Enter a city name.'); return; }
  genBtn.disabled = true;
  setStatus('🔍 ' + name + '…');
  fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(name) + '&format=json&limit=1&polygon_geojson=1', { headers: { 'Accept-Language': 'en' } })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (!data || !data[0]) throw new Error('City not found');
    var d = data[0];
    // Level check: only accept city/town/administrative boundaries
    var okTypes = ['city','town','administrative','municipality','borough','district'];
    var addressType = d.addresstype || d.type || '';
    var placeClass = d.class || '';
    if (placeClass === 'place' && ['village','hamlet','suburb','neighbourhood','quarter','isolated_dwelling'].indexOf(d.type) >= 0) {
      throw new Error('Too specific — please enter a city or region name');
    }
    var label = d.display_name.split(',')[0].trim();
    var lat = parseFloat(d.lat), lon = parseFloat(d.lon);
    var geo = d.geojson || null;
    if (geo && (geo.type === 'Polygon' || geo.type === 'MultiPolygon')) {
      render(label, lat, lon, geo);
      genBtn.disabled = false;
      return;
    }
    setStatus('🗺 Fetching boundary…');
    var oType = d.osm_type === 'relation' ? 'relation' : d.osm_type === 'way' ? 'way' : 'node';
    return fetch('https://overpass-api.de/api/interpreter?data=' + encodeURIComponent('[out:json];' + oType + '(' + d.osm_id + ');out geom;'))
    .then(function(r) { return r.json(); })
    .then(function(op) {
      render(label, lat, lon, overpassGeo(op));
      genBtn.disabled = false;
    });
  })
  .catch(function(e) { setStatus('⚠️ ' + e.message); genBtn.disabled = false; });
}

function overpassGeo(data) {
  if (!data.elements || !data.elements[0]) return null;
  var el = data.elements[0];
  if (el.members) {
    var outers = el.members.filter(function(m) { return m.role === 'outer' && m.geometry; });
    if (outers.length) {
      var ring = [];
      outers.forEach(function(m) { m.geometry.forEach(function(p) { ring.push([p.lon, p.lat]); }); });
      return { type: 'Polygon', coordinates: [ring] };
    }
  }
  if (el.geometry) return { type: 'Polygon', coordinates: [el.geometry.map(function(p) { return [p.lon, p.lat]; })] };
  return null;
}

// ── Douglas-Peucker simplify ──
function dp(pts, eps) {
  if (pts.length <= 2) return pts;
  var mx = 0, ix = 0;
  var p1 = pts[0], p2 = pts[pts.length - 1];
  for (var i = 1; i < pts.length - 1; i++) {
    var d = pld(pts[i], p1, p2);
    if (d > mx) { mx = d; ix = i; }
  }
  if (mx > eps) {
    return dp(pts.slice(0, ix + 1), eps).slice(0, -1).concat(dp(pts.slice(ix), eps));
  }
  return [p1, p2];
}
function pld(p, a, b) {
  var dx = b[0] - a[0], dy = b[1] - a[1];
  if (!dx && !dy) return Math.hypot(p[0] - a[0], p[1] - a[1]);
  var t = Math.max(0, Math.min(1, ((p[0] - a[0]) * dx + (p[1] - a[1]) * dy) / (dx * dx + dy * dy)));
  return Math.hypot(p[0] - a[0] - t * dx, p[1] - a[1] - t * dy);
}

// ── Catmull-Rom spline: expand a polygon ring to many interpolated points ──
function catmullRom(pts, steps) {
  if (pts.length < 3) return pts;
  steps = steps || 8;
  var result = [];
  var n = pts.length;
  for (var i = 0; i < n; i++) {
    var p0 = pts[(i - 1 + n) % n];
    var p1 = pts[i];
    var p2 = pts[(i + 1) % n];
    var p3 = pts[(i + 2) % n];
    for (var s = 0; s < steps; s++) {
      var t = s / steps;
      var t2 = t * t, t3 = t2 * t;
      var x = 0.5 * ((2 * p1[0]) + (-p0[0] + p2[0]) * t + (2 * p0[0] - 5 * p1[0] + 4 * p2[0] - p3[0]) * t2 + (-p0[0] + 3 * p1[0] - 3 * p2[0] + p3[0]) * t3);
      var y = 0.5 * ((2 * p1[1]) + (-p0[1] + p2[1]) * t + (2 * p0[1] - 5 * p1[1] + 4 * p2[1] - p3[1]) * t2 + (-p0[1] + 3 * p1[1] - 3 * p2[1] + p3[1]) * t3);
      result.push([x, y]);
    }
  }
  return result;
}

// ── Morandi palette ──
var morandiColors = [
  [210, 25, 62],
  [340, 20, 65],
  [30,  28, 63],
  [160, 22, 58],
  [270, 18, 60],
  [15,  30, 60],
  [200, 20, 55],
  [50,  25, 62],
  [130, 20, 57],
  [300, 15, 62]
];

// ── CELL-based grid system ──
var CELL = 6; // px per grid cell

// Draw a single cross-stitch × at grid position (col, row) given stamp origin (ox, oy)
// type: 1=outline/text, 2=border, 3=separator line
// color: CSS color string
function drawCross(col, row, ox, oy, type, color) {
  var baseCX = ox + col * CELL + CELL / 2;
  var baseCY = oy + row * CELL + CELL / 2;
  var wobbleAngle = Math.sin(col * 127.1 + row * 311.7) * 0.12;
  var wobbleX = Math.sin(col * 311.7 + row * 127.1) * 0.5;
  var wobbleY = Math.sin(col * 211.3 + row * 431.1) * 0.5;
  var cx = baseCX + wobbleX;
  var cy = baseCY + wobbleY;
  var arm = CELL * (type === 2 ? 0.46 : 0.40);
  var cosA = Math.cos(wobbleAngle), sinA = Math.sin(wobbleAngle);
  var a1x = arm*0.7071*cosA - arm*0.7071*sinA;
  var a1y = arm*0.7071*sinA + arm*0.7071*cosA;
  var a2x = arm*0.7071*cosA - (-arm*0.7071)*sinA;
  var a2y = arm*0.7071*sinA + (-arm*0.7071)*cosA;
  var lw = type === 2 ? 2.2 : (type === 3 ? 1.4 : 1.8);

  // No shadow — just main + subtle highlight
  ctx.save();
  ctx.strokeStyle = color || 'rgba(255,255,255,0.95)';
  ctx.lineWidth = lw;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(cx-a1x, cy-a1y); ctx.lineTo(cx+a1x, cy+a1y);
  ctx.moveTo(cx-a2x, cy-a2y); ctx.lineTo(cx+a2x, cy+a2y);
  ctx.stroke();
  // Highlight (lighter tint)
  ctx.strokeStyle = 'rgba(255,255,255,0.28)';
  ctx.lineWidth = lw * 0.45;
  ctx.beginPath();
  ctx.moveTo(cx-a1x-0.4, cy-a1y-0.4); ctx.lineTo(cx+a1x-0.4, cy+a1y-0.4);
  ctx.moveTo(cx-a2x-0.4, cy-a2y-0.4); ctx.lineTo(cx+a2x-0.4, cy+a2y-0.4);
  ctx.stroke();
  ctx.restore();
}

// ── Rasterize a polyline onto grid cells ──
// pts: array of [x, y] in canvas coords (relative to stamp origin ox, oy)
// grid: Uint8Array(COLS*ROWS), COLS = stamp width / CELL, ROWS = stamp height / CELL
// value: what to mark (1 or 2)
function rasterizePath(pts, grid, COLS, ROWS, ox, oy, value) {
  for (var i = 0; i < pts.length - 1; i++) {
    var x0 = pts[i][0], y0 = pts[i][1];
    var x1 = pts[i + 1][0], y1 = pts[i + 1][1];
    // Walk along the segment in small steps
    var dist = Math.hypot(x1 - x0, y1 - y0);
    var steps = Math.max(1, Math.ceil(dist / (CELL * 0.5)));
    for (var s = 0; s <= steps; s++) {
      var t = s / steps;
      var px = x0 + (x1 - x0) * t;
      var py = y0 + (y1 - y0) * t;
      var col = Math.floor((px - ox) / CELL);
      var row = Math.floor((py - oy) / CELL);
      if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
        var idx = row * COLS + col;
        if (grid[idx] === 0 || value === 2) grid[idx] = value;
      }
    }
  }
}

// ── Rasterize text onto grid via offscreen canvas ──
function rasterizeText(text, font, centerX, centerY, grid, COLS, ROWS, ox, oy, letterSpacing) {
  var tmp = document.createElement('canvas');
  var tmpCtx = tmp.getContext('2d');
  tmpCtx.font = font;
  if(letterSpacing) tmpCtx.letterSpacing = letterSpacing;
  var met = tmpCtx.measureText(text);
  var tw = Math.ceil(met.width) + 80;
  var th = 140;
  tmp.width = tw;
  tmp.height = th;
  tmpCtx.font = font;
  if(letterSpacing) tmpCtx.letterSpacing = letterSpacing;
  tmpCtx.textAlign = 'center';
  tmpCtx.textBaseline = 'middle';
  tmpCtx.fillStyle = '#fff';
  tmpCtx.fillText(text, tw / 2, th / 2);

  var imgd = tmpCtx.getImageData(0, 0, tw, th).data;
  // top-left corner of text block in canvas coords
  var tlx = centerX - tw / 2;
  var tly = centerY - th / 2;

  for (var py = 0; py < th; py++) {
    for (var px = 0; px < tw; px++) {
      var alpha = imgd[(py * tw + px) * 4 + 3];
      if (alpha < 60) continue;
      var canvasX = tlx + px;
      var canvasY = tly + py;
      var col = Math.floor((canvasX - ox) / CELL);
      var row = Math.floor((canvasY - oy) / CELL);
      if (col >= 0 && col < COLS && row >= 0 && row < ROWS) {
        var gi = row * COLS + col;
        if (grid[gi] === 0) grid[gi] = 1;
      }
    }
  }
}

// ── Mark double border ring: outer ring (type 2) + inner ring (type 2), gap in between ──
function rasterizeBorder(grid, COLS, ROWS) {
  // Outer ring (row 0-1, col 0-1)
  for (var c = 0; c < COLS; c++) {
    grid[0 * COLS + c] = 2;
    grid[1 * COLS + c] = 2;
    grid[(ROWS-1) * COLS + c] = 2;
    grid[(ROWS-2) * COLS + c] = 2;
  }
  for (var rr = 0; rr < ROWS; rr++) {
    grid[rr * COLS + 0] = 2;
    grid[rr * COLS + 1] = 2;
    grid[rr * COLS + (COLS-1)] = 2;
    grid[rr * COLS + (COLS-2)] = 2;
  }
  // Inner ring (gap of 1 cell = row 2/ROWS-3, col 2/COLS-3) → row 3/ROWS-4
  var inner = 4; // 1 gap cell after outer 2
  for (var c = inner; c < COLS-inner; c++) {
    if(grid[inner * COLS + c] === 0) grid[inner * COLS + c] = 2;
    if(grid[(ROWS-1-inner) * COLS + c] === 0) grid[(ROWS-1-inner) * COLS + c] = 2;
  }
  for (var rr = inner; rr < ROWS-inner; rr++) {
    if(grid[rr * COLS + inner] === 0) grid[rr * COLS + inner] = 2;
    if(grid[rr * COLS + (COLS-1-inner)] === 0) grid[rr * COLS + (COLS-1-inner)] = 2;
  }
}

// ── HSL to hex helper ──
function hsl2hex(h, s, l) {
  s /= 100; l /= 100;
  var a = s * Math.min(l, 1 - l);
  function f(n) {
    var k = (n + h / 30) % 12;
    var color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
    return Math.round(255 * color).toString(16).padStart(2, '0');
  }
  return '#' + f(0) + f(8) + f(4);
}

// ── Rounded rect path helper ──
function roundRect(ctx2, x, y, w, h, r) {
  ctx2.beginPath();
  ctx2.moveTo(x + r, y);
  ctx2.lineTo(x + w - r, y);
  ctx2.arcTo(x + w, y, x + w, y + r, r);
  ctx2.lineTo(x + w, y + h - r);
  ctx2.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx2.lineTo(x + r, y + h);
  ctx2.arcTo(x, y + h, x, y + h - r, r);
  ctx2.lineTo(x, y + r);
  ctx2.arcTo(x, y, x + r, y, r);
  ctx2.closePath();
}

// ── Main render ──
function render(cityName, lat, lon, geojson) {
  ctx.clearRect(0, 0, W, H);

  // Stamp rect
  var margin = 30;
  var sx = margin, sy = margin;
  var sw = W - margin * 2;
  var sh = H - margin * 2;
  var cornerR = 10;

  // Grid dimensions (in cells) — grid covers exactly the stamp area
  var COLS = Math.floor(sw / CELL);
  var ROWS = Math.floor(sh / CELL);
  var grid = new Uint8Array(COLS * ROWS);

  // Effective stamp area snapped to cell grid
  var stampW = COLS * CELL;
  var stampH = ROWS * CELL;
  // Stamp origin (top-left) shifted to center within margin
  var ox = sx + Math.floor((sw - stampW) / 2);
  var oy = sy + Math.floor((sh - stampH) / 2);

  // ── Morandi color ──
  var cidx = Math.abs(Math.round(lat + lon)) % morandiColors.length;
  var mc = morandiColors[cidx];
  var mH = mc[0], mS = mc[1], mL = mc[2];
  var stampColor = 'hsl(' + mH + ',' + mS + '%,' + mL + '%)';
  var lLight = Math.min(100, mL + 4);
  var lDark  = Math.max(0, mL - 4);
  // 3-color stitch system:
  // color1 = bright white — city outline + text
  // color2 = light tint — separator line
  // color3 = darker same-hue — border frame
  var color1 = 'rgba(255,255,255,0.96)';
  var color2 = 'hsla(' + mH + ',' + mS + '%,' + Math.min(100,mL+30) + '%,0.9)';
  var color3 = 'hsl(' + mH + ',' + Math.min(100,mS+10) + '%,' + Math.max(20,mL-25) + '%)';

  // ── A. Rasterize city outline onto grid ──
  if (geojson) {
    var ring = [];
    if (geojson.type === 'Polygon') {
      ring = geojson.coordinates[0];
    } else if (geojson.type === 'MultiPolygon') {
      var best = null, bestLen = 0;
      geojson.coordinates.forEach(function(poly) {
        if (poly[0].length > bestLen) { bestLen = poly[0].length; best = poly[0]; }
      });
      ring = best || [];
    }

    if (ring.length > 2) {
      ring = dp(ring, 0.02);

      var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      ring.forEach(function(p) {
        if (p[0] < minX) minX = p[0];
        if (p[0] > maxX) maxX = p[0];
        if (p[1] < minY) minY = p[1];
        if (p[1] > maxY) maxY = p[1];
      });

      // Target area: below text zone (top ~130px of stamp), centered
      var textZoneH = 130; // px from stamp top
      var outlineAreaW = stampW * 0.72;
      var outlineAreaH = stampH - textZoneH - 20;
      var scX = outlineAreaW / (maxX - minX || 1);
      var scY = outlineAreaH / (maxY - minY || 1);
      var sc = Math.min(scX, scY);

      var midLng = (minX + maxX) / 2;
      var midLat = (minY + maxY) / 2;
      var shapeCX = ox + stampW / 2;
      var shapeCY = oy + textZoneH + outlineAreaH / 2;

      // Map geo coords → canvas coords
      var mappedRing = ring.map(function(p) {
        return [
          shapeCX + (p[0] - midLng) * sc,
          shapeCY - (p[1] - midLat) * sc
        ];
      });

      // Catmull-Rom smooth
      var smoothRing = catmullRom(mappedRing, 6);
      // close the loop
      smoothRing.push(smoothRing[0]);

      rasterizePath(smoothRing, grid, COLS, ROWS, ox, oy, 1);
    }
  }

  // ── B. Rasterize city name text ──
  var displayName = cityName.toUpperCase();
  var fontSize = displayName.length > 14 ? 28 : displayName.length > 10 ? 34 : 40;
  var textFont = '400 ' + fontSize + 'px "Press Start 2P",monospace';
  var textCX = ox + stampW / 2;
  var textCY = oy + 72;
  rasterizeText(displayName, textFont, textCX, textCY, grid, COLS, ROWS, ox, oy, '0.18em');

  // ── Separator line below city name (full width, 1 cell thick) ──
  var lineY = oy + 110; // pixels below stamp top
  var lineRow = Math.floor((lineY - oy) / CELL);
  if(lineRow >= 0 && lineRow < ROWS){
    for(var lc = 2; lc < COLS-2; lc++){
      if(grid[lineRow * COLS + lc] === 0) grid[lineRow * COLS + lc] = 3;
    }
  }

  // ── C. Rasterize border ring (2 cells thick) ──
  rasterizeBorder(grid, COLS, ROWS, 2);

  // ══════════════════════════════════════════
  // DRAW
  // ══════════════════════════════════════════

  // Draw page background
  ctx.fillStyle = '#e8e4de';
  ctx.fillRect(0, 0, W, H);

  // Stamp base fill (no drop shadow)
  ctx.save();
  roundRect(ctx, ox, oy, stampW, stampH, cornerR);
  ctx.clip();

  // Morandi base
  ctx.fillStyle = stampColor;
  ctx.fillRect(ox, oy, stampW, stampH);

  // Fabric texture: 6px alternating lightness cells
  for (var fy = 0; fy < ROWS; fy++) {
    for (var fx = 0; fx < COLS; fx++) {
      var isLight = (fx + fy) % 2 === 0;
      ctx.fillStyle = isLight
        ? 'hsl(' + mH + ',' + mS + '%,' + lLight + '%)'
        : 'hsl(' + mH + ',' + mS + '%,' + lDark + '%)';
      ctx.fillRect(ox + fx * CELL, oy + fy * CELL, CELL, CELL);
    }
  }

  ctx.restore();

  // Draw all stitches (clipped to stamp)
  ctx.save();
  roundRect(ctx, ox, oy, stampW, stampH, cornerR);
  ctx.clip();

  for (var row = 0; row < ROWS; row++) {
    for (var col = 0; col < COLS; col++) {
      var cellVal = grid[row * COLS + col];
      if (cellVal > 0) {
        var col3 = cellVal === 2 ? color3 : (cellVal === 3 ? color2 : color1);
        drawCross(col, row, ox, oy, cellVal, col3);
      }
    }
  }

  ctx.restore();

  // Stamp border outline (very subtle white rim)
  ctx.save();
  roundRect(ctx, ox, oy, stampW, stampH, cornerR);
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();

  document.getElementById('canvas-wrap').style.display = 'flex';
  setStatus('✅  ' + cityName);
}

genBtn.addEventListener('click', go);
document.getElementById('dl-btn').addEventListener('click', function() {
  var a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = 'citybadge.png';
  a.click();
});
</script>
</body>
</html>
