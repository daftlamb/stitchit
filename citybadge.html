<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>City Badge — Test</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f0ede8;font:13px/1.5 system-ui,sans-serif;color:#1a1a1a;display:flex;flex-direction:column;align-items:center;padding:40px 20px;min-height:100vh}
h1{font-size:20px;font-weight:700;margin-bottom:24px;letter-spacing:.02em}
.search-row{display:flex;gap:8px;margin-bottom:24px;width:100%;max-width:480px}
input{flex:1;padding:10px 14px;border:1.5px solid #d0ccc4;border-radius:8px;font-size:14px;outline:none;background:#fff}
input:focus{border-color:#6040b0}
button{padding:10px 20px;background:#6040b0;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600}
button:hover{background:#5030a0}
button:disabled{background:#b0a0d0;cursor:not-allowed}
#status{font-size:12px;color:#707070;margin-bottom:16px;min-height:18px}
#canvas-wrap{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,.1);padding:20px;display:none}
canvas{display:block}
#dl-btn{margin-top:16px;padding:8px 24px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;display:none}
.suggestions{position:absolute;background:#fff;border:1px solid #d0ccc4;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.1);width:calc(100% - 8px);max-height:200px;overflow-y:auto;z-index:10}
.sug-item{padding:8px 14px;cursor:pointer;font-size:13px}
.sug-item:hover{background:#f0ede8}
.search-wrap{position:relative;flex:1}
</style>
</head>
<body>
<h1>City Badge — Prototype</h1>
<div class="search-row">
  <div class="search-wrap">
    <input id="city-input" type="text" placeholder="Enter city name (e.g. Tokyo, Paris, Shanghai)…" autocomplete="off">
    <div id="suggestions" class="suggestions" style="display:none"></div>
  </div>
  <button id="gen-btn">Generate</button>
</div>
<div id="status"></div>
<div id="canvas-wrap"><canvas id="badge" width="480" height="480"></canvas></div>
<button id="dl-btn">Download PNG</button>

<script>
var canvas=document.getElementById('badge');
var ctx=canvas.getContext('2d');
var status=document.getElementById('status');
var cityInput=document.getElementById('city-input');
var sugBox=document.getElementById('suggestions');
var genBtn=document.getElementById('gen-btn');
var dlBtn=document.getElementById('dl-btn');
var W=480,H=480;

// ── Autocomplete via Nominatim ──
var sugTimer=null;
cityInput.addEventListener('input',function(){
  clearTimeout(sugTimer);
  var q=this.value.trim();
  if(q.length<2){sugBox.style.display='none';return;}
  sugTimer=setTimeout(function(){fetchSuggestions(q);},400);
});
cityInput.addEventListener('keydown',function(e){
  if(e.key==='Enter') generateBadge();
});
document.addEventListener('click',function(e){
  if(!e.target.closest('.search-wrap')) sugBox.style.display='none';
});

function fetchSuggestions(q){
  fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q)+'&format=json&limit=5&featuretype=city&addressdetails=1',{headers:{'Accept-Language':'en'}})
  .then(function(r){return r.json();})
  .then(function(data){
    sugBox.innerHTML='';
    if(!data.length){sugBox.style.display='none';return;}
    data.forEach(function(d){
      var div=document.createElement('div');
      div.className='sug-item';
      div.textContent=d.display_name;
      div.addEventListener('click',function(){
        cityInput.value=d.display_name.split(',')[0];
        cityInput.dataset.osmId=d.osm_id;
        cityInput.dataset.osmType=d.osm_type;
        cityInput.dataset.lat=d.lat;
        cityInput.dataset.lon=d.lon;
        sugBox.style.display='none';
        generateBadge();
      });
      sugBox.appendChild(div);
    });
    sugBox.style.display='block';
  }).catch(function(){sugBox.style.display='none';});
}

// ── Main generate flow ──
function generateBadge(){
  sugBox.style.display='none';
  var cityName=cityInput.value.trim();
  if(!cityName){status.textContent='Enter a city name.';return;}
  genBtn.disabled=true;
  status.textContent='🔍 Looking up city…';

  // Step 1: Nominatim search to get OSM relation ID
  var searchUrl='https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(cityName)+'&format=json&limit=1&polygon_geojson=1&addressdetails=1';
  fetch(searchUrl,{headers:{'Accept-Language':'en'}})
  .then(function(r){return r.json();})
  .then(function(data){
    if(!data||!data[0]){throw new Error('City not found');}
    var d=data[0];
    var displayName=d.display_name.split(',')[0].trim();
    var lat=parseFloat(d.lat), lon=parseFloat(d.lon);

    // If Nominatim returned polygon directly, use it
    if(d.geojson&&(d.geojson.type==='Polygon'||d.geojson.type==='MultiPolygon')){
      status.textContent='✏️ Drawing badge…';
      drawBadge(displayName, lat, lon, d.geojson);
      genBtn.disabled=false;
      return;
    }

    // Otherwise fetch via Overpass using osm_id
    status.textContent='🗺 Fetching city boundary…';
    var osmType=d.osm_type; // 'relation','way','node'
    var osmId=d.osm_id;
    var overpassType=osmType==='relation'?'relation':osmType==='way'?'way':'node';
    var query='[out:json];'+overpassType+'('+osmId+');out geom;';
    return fetch('https://overpass-api.de/api/interpreter?data='+encodeURIComponent(query))
    .then(function(r){return r.json();})
    .then(function(opData){
      status.textContent='✏️ Drawing badge…';
      var geojson=overpassToGeoJSON(opData);
      drawBadge(displayName, lat, lon, geojson);
      genBtn.disabled=false;
    });
  })
  .catch(function(err){
    status.textContent='⚠️ '+err.message+'. Try a different city name.';
    genBtn.disabled=false;
  });
}

// ── Convert Overpass relation to GeoJSON-like polygon ──
function overpassToGeoJSON(data){
  if(!data.elements||!data.elements[0]) return null;
  var el=data.elements[0];
  // Try to build outer ring from members
  if(el.members){
    var outers=el.members.filter(function(m){return m.role==='outer'&&m.geometry;});
    if(outers.length){
      var ring=[];
      outers.forEach(function(m){m.geometry.forEach(function(p){ring.push([p.lon,p.lat]);});});
      return {type:'Polygon',coordinates:[ring]};
    }
  }
  // Way with geometry
  if(el.geometry){
    var ring=el.geometry.map(function(p){return [p.lon,p.lat];});
    return {type:'Polygon',coordinates:[ring]};
  }
  return null;
}

// ── Douglas-Peucker simplification ──
function dpSimplify(pts, eps){
  if(pts.length<=2) return pts;
  var maxD=0, idx=0;
  var p1=pts[0], p2=pts[pts.length-1];
  for(var i=1;i<pts.length-1;i++){
    var d=pointLineDist(pts[i],p1,p2);
    if(d>maxD){maxD=d;idx=i;}
  }
  if(maxD>eps){
    var l=dpSimplify(pts.slice(0,idx+1),eps);
    var r=dpSimplify(pts.slice(idx),eps);
    return l.slice(0,-1).concat(r);
  }
  return [p1,p2];
}
function pointLineDist(p,a,b){
  var dx=b[0]-a[0],dy=b[1]-a[1];
  if(dx===0&&dy===0) return Math.hypot(p[0]-a[0],p[1]-a[1]);
  var t=((p[0]-a[0])*dx+(p[1]-a[1])*dy)/(dx*dx+dy*dy);
  t=Math.max(0,Math.min(1,t));
  return Math.hypot(p[0]-(a[0]+t*dx),p[1]-(a[1]+t*dy));
}

// ── Main drawing ──
function drawBadge(cityName, lat, lon, geojson){
  ctx.clearRect(0,0,W,H);

  // Background circle
  ctx.save();
  ctx.beginPath();
  ctx.arc(W/2,H/2,W/2-4,0,Math.PI*2);
  ctx.fillStyle='#1a1830';
  ctx.fill();
  ctx.strokeStyle='#6040b0';
  ctx.lineWidth=4;
  ctx.stroke();
  ctx.restore();

  // Inner ring
  ctx.save();
  ctx.beginPath();
  ctx.arc(W/2,H/2,W/2-16,0,Math.PI*2);
  ctx.strokeStyle='rgba(255,255,255,0.15)';
  ctx.lineWidth=1;
  ctx.stroke();
  ctx.restore();

  // Draw city outline in center
  if(geojson){
    drawCityOutline(geojson);
  } else {
    // Fallback: dot at center
    ctx.beginPath();
    ctx.arc(W/2,H/2-20,8,0,Math.PI*2);
    ctx.fillStyle='#c8b8f0';
    ctx.fill();
  }

  // City name
  ctx.save();
  ctx.fillStyle='#ffffff';
  ctx.font='bold 28px system-ui,sans-serif';
  ctx.textAlign='center';
  ctx.letterSpacing='0.1em';
  ctx.fillText(cityName.toUpperCase(), W/2, H-100);
  ctx.restore();

  // Coordinates
  var latStr=(Math.abs(lat).toFixed(1))+'°'+(lat>=0?'N':'S');
  var lonStr=(Math.abs(lon).toFixed(1))+'°'+(lon>=0?'E':'W');
  ctx.save();
  ctx.fillStyle='rgba(200,184,240,0.8)';
  ctx.font='13px system-ui,sans-serif';
  ctx.textAlign='center';
  ctx.fillText(latStr+'  '+lonStr, W/2, H-74);
  ctx.restore();

  // Decorative dots
  ctx.save();
  ctx.fillStyle='rgba(200,184,240,0.5)';
  for(var i=0;i<5;i++){
    var x=W/2-48+i*24, y=H-52;
    ctx.beginPath(); ctx.arc(x,y,3,0,Math.PI*2); ctx.fill();
  }
  ctx.restore();

  document.getElementById('canvas-wrap').style.display='block';
  dlBtn.style.display='block';
  status.textContent='✅ Done — '+cityName;
}

function drawCityOutline(geojson){
  var rings=[];
  if(geojson.type==='Polygon') rings=[geojson.coordinates[0]];
  else if(geojson.type==='MultiPolygon'){
    // pick largest ring
    var best=null,bestLen=0;
    geojson.coordinates.forEach(function(poly){
      if(poly[0].length>bestLen){bestLen=poly[0].length;best=poly[0];}
    });
    if(best) rings=[best];
  }
  if(!rings.length) return;

  var ring=rings[0];
  // Simplify
  ring=dpSimplify(ring,0.01);

  // Bounding box
  var minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  ring.forEach(function(p){
    if(p[0]<minX)minX=p[0]; if(p[0]>maxX)maxX=p[0];
    if(p[1]<minY)minY=p[1]; if(p[1]>maxY)maxY=p[1];
  });

  // Fit into center zone (radius ~140px)
  var pad=100, zone=W-pad*2;
  var scaleX=zone/(maxX-minX||1);
  var scaleY=zone/(maxY-minY||1);
  var scale=Math.min(scaleX,scaleY)*0.72;
  var cx=W/2, cy=H/2-20;

  // Clip to circle
  ctx.save();
  ctx.beginPath();
  ctx.arc(W/2,H/2,W/2-20,0,Math.PI*2);
  ctx.clip();

  // Glow
  ctx.shadowColor='rgba(120,80,220,0.6)';
  ctx.shadowBlur=18;

  // Outline fill
  ctx.beginPath();
  ring.forEach(function(p,i){
    var x=cx+(p[0]-(minX+maxX)/2)*scale;
    var y=cy-((p[1]-(minY+maxY)/2)*scale); // flip Y
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.closePath();
  ctx.fillStyle='rgba(100,70,180,0.35)';
  ctx.fill();
  ctx.strokeStyle='rgba(200,180,255,0.85)';
  ctx.lineWidth=1.5;
  ctx.stroke();

  ctx.restore();
}

genBtn.addEventListener('click',generateBadge);
dlBtn.addEventListener('click',function(){
  var a=document.createElement('a');
  a.href=canvas.toDataURL('image/png');
  a.download='citybadge.png';
  a.click();
});
</script>
</body>
</html>
