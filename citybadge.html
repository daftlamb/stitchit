<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>City Badge</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#e8e4de;font:13px/1.5 'Outfit',system-ui,sans-serif;color:#1a1a1a;display:flex;flex-direction:column;align-items:center;padding:40px 20px;min-height:100vh}
h1{font-size:15px;font-weight:700;margin-bottom:24px;letter-spacing:.14em;text-transform:uppercase;color:#3a3028}
.search-row{display:flex;gap:8px;margin-bottom:20px;width:100%;max-width:440px}
.search-wrap{position:relative;flex:1}
input{width:100%;padding:10px 14px;border:2px solid #b0a898;border-radius:10px;font-size:14px;outline:none;background:#faf8f4;font-family:'Outfit',sans-serif}
input:focus{border-color:#7060a0}
button{padding:10px 22px;background:#2a2030;color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:700;letter-spacing:.06em;font-family:'Outfit',sans-serif}
button:hover{background:#1a1020}
button:disabled{opacity:.5;cursor:not-allowed}
#status{font-size:12px;color:#706050;margin-bottom:20px;min-height:18px}
#canvas-wrap{display:none;flex-direction:column;align-items:center;gap:16px}
canvas{display:block}
.dl-btn{padding:9px 28px;background:#2a2030;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:700;font-family:'Outfit',sans-serif}
.suggestions{position:absolute;top:100%;left:0;right:0;margin-top:4px;background:#faf8f4;border:1.5px solid #b0a898;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.12);max-height:200px;overflow-y:auto;z-index:10}
.sug-item{padding:9px 14px;cursor:pointer;font-size:13px;border-bottom:1px solid #ece8e0;font-family:'Outfit',sans-serif}
.sug-item:last-child{border-bottom:none}
.sug-item:hover{background:#f0ede8}
</style>
</head>
<body>
<h1>City Badge</h1>
<div class="search-row">
  <div class="search-wrap">
    <input id="city-input" type="text" placeholder="Tokyo, Paris, New York, Shanghai…" autocomplete="off">
    <div id="suggestions" class="suggestions" style="display:none"></div>
  </div>
  <button id="gen-btn">Make</button>
</div>
<div id="status"></div>
<div id="canvas-wrap">
  <canvas id="badge" width="520" height="640"></canvas>
  <button class="dl-btn" id="dl-btn">Download PNG</button>
</div>
<script>
var canvas = document.getElementById('badge');
var ctx = canvas.getContext('2d');
var W = 520, H = 640;
var cityInput = document.getElementById('city-input');
var sugBox = document.getElementById('suggestions');
var genBtn = document.getElementById('gen-btn');

var sugTimer = null;
cityInput.addEventListener('input', function() {
  clearTimeout(sugTimer);
  var q = this.value.trim();
  if (q.length < 2) { sugBox.style.display = 'none'; return; }
  sugTimer = setTimeout(function() { fetchSug(q); }, 380);
});
cityInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') go(); });
document.addEventListener('click', function(e) {
  if (!e.target.closest('.search-wrap')) sugBox.style.display = 'none';
});

function fetchSug(q) {
  fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(q) + '&format=json&limit=5&featuretype=city', { headers: { 'Accept-Language': 'en' } })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    sugBox.innerHTML = '';
    if (!data.length) { sugBox.style.display = 'none'; return; }
    data.forEach(function(d) {
      var div = document.createElement('div');
      div.className = 'sug-item';
      div.textContent = d.display_name;
      div.addEventListener('click', function() {
        cityInput.value = d.display_name.split(',')[0];
        sugBox.style.display = 'none';
        go();
      });
      sugBox.appendChild(div);
    });
    sugBox.style.display = 'block';
  })
  .catch(function() { sugBox.style.display = 'none'; });
}

function setStatus(t) { document.getElementById('status').textContent = t; }

function go() {
  sugBox.style.display = 'none';
  var name = cityInput.value.trim();
  if (!name) { setStatus('Enter a city name.'); return; }
  genBtn.disabled = true;
  setStatus('🔍 ' + name + '…');
  fetch('https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(name) + '&format=json&limit=1&polygon_geojson=1', { headers: { 'Accept-Language': 'en' } })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (!data || !data[0]) throw new Error('City not found');
    var d = data[0];
    var label = d.display_name.split(',')[0].trim();
    var lat = parseFloat(d.lat), lon = parseFloat(d.lon);
    var geo = d.geojson || null;
    if (geo && (geo.type === 'Polygon' || geo.type === 'MultiPolygon')) {
      render(label, lat, lon, geo);
      genBtn.disabled = false;
      return;
    }
    setStatus('🗺 Fetching boundary…');
    var oType = d.osm_type === 'relation' ? 'relation' : d.osm_type === 'way' ? 'way' : 'node';
    return fetch('https://overpass-api.de/api/interpreter?data=' + encodeURIComponent('[out:json];' + oType + '(' + d.osm_id + ');out geom;'))
    .then(function(r) { return r.json(); })
    .then(function(op) {
      render(label, lat, lon, overpassGeo(op));
      genBtn.disabled = false;
    });
  })
  .catch(function(e) { setStatus('⚠️ ' + e.message); genBtn.disabled = false; });
}

function overpassGeo(data) {
  if (!data.elements || !data.elements[0]) return null;
  var el = data.elements[0];
  if (el.members) {
    var outers = el.members.filter(function(m) { return m.role === 'outer' && m.geometry; });
    if (outers.length) {
      var ring = [];
      outers.forEach(function(m) { m.geometry.forEach(function(p) { ring.push([p.lon, p.lat]); }); });
      return { type: 'Polygon', coordinates: [ring] };
    }
  }
  if (el.geometry) return { type: 'Polygon', coordinates: [el.geometry.map(function(p) { return [p.lon, p.lat]; })] };
  return null;
}

// Douglas-Peucker simplify
function dp(pts, eps) {
  if (pts.length <= 2) return pts;
  var mx = 0, ix = 0;
  var p1 = pts[0], p2 = pts[pts.length - 1];
  for (var i = 1; i < pts.length - 1; i++) {
    var d = pld(pts[i], p1, p2);
    if (d > mx) { mx = d; ix = i; }
  }
  if (mx > eps) {
    return dp(pts.slice(0, ix + 1), eps).slice(0, -1).concat(dp(pts.slice(ix), eps));
  }
  return [p1, p2];
}
function pld(p, a, b) {
  var dx = b[0] - a[0], dy = b[1] - a[1];
  if (!dx && !dy) return Math.hypot(p[0] - a[0], p[1] - a[1]);
  var t = Math.max(0, Math.min(1, ((p[0] - a[0]) * dx + (p[1] - a[1]) * dy) / (dx * dx + dy * dy)));
  return Math.hypot(p[0] - a[0] - t * dx, p[1] - a[1] - t * dy);
}

// Build smooth path commands using midpoint quadraticCurveTo
function buildSmooth(ring) {
  var cmds = [];
  cmds.push({ t: 'M', x: (ring[0][0] + ring[1][0]) / 2, y: (ring[0][1] + ring[1][1]) / 2 });
  for (var i = 1; i < ring.length - 1; i++) {
    cmds.push({
      t: 'Q',
      cx: ring[i][0], cy: ring[i][1],
      x: (ring[i][0] + ring[i + 1][0]) / 2,
      y: (ring[i][1] + ring[i + 1][1]) / 2
    });
  }
  cmds.push({
    t: 'Q',
    cx: ring[ring.length - 1][0], cy: ring[ring.length - 1][1],
    x: (ring[ring.length - 1][0] + ring[0][0]) / 2,
    y: (ring[ring.length - 1][1] + ring[0][1]) / 2
  });
  cmds.push({ t: 'Z' });
  return cmds;
}

// Apply path commands to context, with optional dx/dy offset
function applyPath(cmds, dx, dy) {
  var ox = dx || 0, oy = dy || 0;
  ctx.beginPath();
  cmds.forEach(function(c) {
    if (c.t === 'M') ctx.moveTo(c.x + ox, c.y + oy);
    else if (c.t === 'Q') ctx.quadraticCurveTo(c.cx + ox, c.cy + oy, c.x + ox, c.y + oy);
    else if (c.t === 'Z') ctx.closePath();
  });
}

// ── Morandi palette (muted, grayish, elegant) ──
var morandiColors = [
  [210, 25, 62],
  [340, 20, 65],
  [30,  28, 63],
  [160, 22, 58],
  [270, 18, 60],
  [15,  30, 60],
  [200, 20, 55],
  [50,  25, 62],
  [130, 20, 57],
  [300, 15, 62]
];

// ── Stamp perforation: draw rect path with inward semicircle notches ──
function drawStampShape(x, y, w, h, cornerR, holeR) {
  var pad = holeR * 1.8; // corner clear zone — no holes within this distance of corner
  var sp = holeR * 3.0;  // spacing between hole centers

  // Distribute n holes evenly between pad...(len-pad)
  function makeHoles(len) {
    var avail = len - pad * 2;
    var n = Math.max(1, Math.round(avail / sp));
    var arr = [];
    for (var i = 0; i < n; i++) arr.push(pad + (avail / (n + 1)) * (i + 1));
    return arr;
  }

  var hx = makeHoles(w); // hole offsets along x axis
  var hy = makeHoles(h); // hole offsets along y axis

  ctx.beginPath();
  ctx.moveTo(x, y);

  // Top edge L→R
  for (var i = 0; i < hx.length; i++) {
    var cx = x + hx[i];
    ctx.lineTo(cx - holeR, y);
    ctx.arc(cx, y, holeR, Math.PI, 0, true);
  }
  ctx.lineTo(x + w, y);

  // Right edge T→B
  for (var i = 0; i < hy.length; i++) {
    var cy = y + hy[i];
    ctx.lineTo(x + w, cy - holeR);
    ctx.arc(x + w, cy, holeR, Math.PI * 1.5, Math.PI * 0.5, true);
  }
  ctx.lineTo(x + w, y + h);

  // Bottom edge R→L
  for (var i = hx.length - 1; i >= 0; i--) {
    var cx = x + hx[i];
    ctx.lineTo(cx + holeR, y + h);
    ctx.arc(cx, y + h, holeR, 0, Math.PI, true);
  }
  ctx.lineTo(x, y + h);

  // Left edge B→T
  for (var i = hy.length - 1; i >= 0; i--) {
    var cy = y + hy[i];
    ctx.lineTo(x, cy + holeR);
    ctx.arc(x, cy, holeR, Math.PI * 0.5, Math.PI * 1.5, true);
  }
  ctx.lineTo(x, y);
  ctx.closePath();
}

// ── Stitch unit drawing along a sampled path — with hand-stitch wobble ──
// Simple deterministic pseudo-random
function seededRand(seed){ return (Math.sin(seed*127.1+311.7)*43758.5453)%1; }

function stitchAlongPath(pts, stitchSize, mode, strokeStyle, lineWidth){
  if(pts.length<2) return;
  var total=0, dists=[0];
  for(var i=1;i<pts.length;i++){
    total+=Math.hypot(pts[i][0]-pts[i-1][0],pts[i][1]-pts[i-1][1]);
    dists.push(total);
  }
  var gap=stitchSize*1.1;
  var s=stitchSize*0.5;
  ctx.strokeStyle=strokeStyle; ctx.lineWidth=lineWidth;
  ctx.lineJoin='round'; ctx.lineCap='round';
  var idx=0;
  for(var d=gap/2;d<total;d+=gap){
    var seg=0;
    for(var k=1;k<dists.length;k++){if(dists[k]>=d){seg=k;break;}}
    var t=(d-dists[seg-1])/(dists[seg]-dists[seg-1]||1);
    var px=pts[seg-1][0]+(pts[seg][0]-pts[seg-1][0])*t;
    var py=pts[seg-1][1]+(pts[seg][1]-pts[seg-1][1])*t;
    var tx=pts[seg][0]-pts[seg-1][0], ty=pts[seg][1]-pts[seg-1][1];
    var tlen=Math.hypot(tx,ty)||1; tx/=tlen; ty/=tlen;
    var nx=-ty, ny=tx;
    // Hand wobble: slight random angle deviation + position jitter
    var wobble=(seededRand(idx)*2-1)*0.18; // ±10° max
    var cw=Math.cos(wobble), sw2=Math.sin(wobble);
    var jtx=tx*cw-ty*sw2, jty=tx*sw2+ty*cw; // rotated tangent
    var jnx=-jty, jny=jtx;
    var jx=px+(seededRand(idx+0.3)*2-1)*0.8; // position jitter ±0.8px
    var jy=py+(seededRand(idx+0.7)*2-1)*0.8;
    idx++;
    ctx.beginPath();
    if(mode==='cross'){
      ctx.moveTo(jx+(-s*jtx-s*jnx), jy+(-s*jty-s*jny));
      ctx.lineTo(jx+( s*jtx+s*jnx), jy+( s*jty+s*jny));
      ctx.moveTo(jx+(-s*jtx+s*jnx), jy+(-s*jty+s*jny));
      ctx.lineTo(jx+( s*jtx-s*jnx), jy+( s*jty-s*jny));
    } else {
      ctx.moveTo(jx+(-s*jnx), jy+(-s*jny));
      ctx.lineTo(jx, jy+(s*0.4));
      ctx.moveTo(jx+( s*jnx), jy+( s*jny));
      ctx.lineTo(jx, jy+(s*0.4));
    }
    ctx.stroke();
  }
}

function stitchOutline(mapped, stitchSize){
  var sz=stitchSize||10;
  // Shadow layer
  ctx.save(); ctx.translate(1,1.5);
  stitchAlongPath(mapped, sz, 'cross', 'rgba(0,0,0,0.38)', sz*0.9);
  ctx.restore();
  // Main white crosses
  stitchAlongPath(mapped, sz, 'cross', 'rgba(255,255,255,0.97)', sz*0.55);
  // Highlight V stitches offset half a gap
  ctx.save(); ctx.translate(0,-0.8);
  stitchAlongPath(mapped, sz, 'v', 'rgba(255,255,255,0.55)', sz*0.32);
  ctx.restore();
}

function embroideryStroke(drawFn, lw) {
  ctx.save(); ctx.translate(1,1);
  drawFn();
  ctx.strokeStyle='rgba(0,0,0,0.28)'; ctx.lineWidth=lw+2;
  ctx.lineJoin='round'; ctx.lineCap='round'; ctx.setLineDash([]); ctx.stroke();
  ctx.restore();
  drawFn();
  ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineWidth=lw;
  ctx.lineJoin='round'; ctx.lineCap='round'; ctx.setLineDash([5,2]); ctx.stroke();
  ctx.setLineDash([]);
}


function embroideryText(text, x, y, font, align) {
  // Render text to offscreen canvas, sample edge pixels, draw cross stitches
  var sz = 3; // stitch size — small for readable text
  var tmp = document.createElement('canvas');
  // measure text
  ctx.font = font; ctx.textAlign = align||'center';
  var metrics = ctx.measureText(text);
  var tw = Math.ceil(metrics.width) + sz*4;
  var th = Math.ceil(metrics.actualBoundingBoxAscent + metrics.actualBoundingBoxDescent) + sz*4;
  tmp.width = tw; tmp.height = th;
  var tc = tmp.getContext('2d');
  tc.font = font; tc.textAlign = 'center'; tc.textBaseline = 'middle';
  tc.fillStyle = '#fff';
  tc.fillText(text, tw/2, th/2);
  var imgd = tc.getImageData(0,0,tw,th).data;
  // Build list of lit pixels, then place stitches on grid
  var grid = sz; // one stitch per grid cell
  var ox = x - tw/2, oy = y - th/2; // top-left origin in main canvas
  for(var gy=0; gy<th; gy+=grid){
    for(var gx=0; gx<tw; gx+=grid){
      // sample center of cell
      var cx2=Math.floor(gx+grid/2), cy2=Math.floor(gy+grid/2);
      if(cx2>=tw||cy2>=th) continue;
      var a=imgd[(cy2*tw+cx2)*4+3];
      if(a<60) continue;
      var px=ox+gx+grid/2, py=oy+gy+grid/2;
      var s=sz*0.5;
      var jx = px + (seededRand(tidx)*2-1)*0.6;
      var jy = py + (seededRand(tidx+0.5)*2-1)*0.6;
      var ang = (seededRand(tidx+1.1)*2-1)*0.15;
      var ca=Math.cos(ang), sa=Math.sin(ang);
      // shadow
      ctx.strokeStyle='rgba(0,0,0,0.35)'; ctx.lineWidth=sz*0.7;
      ctx.lineJoin='round'; ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(jx+(-s*ca-s*(-sa))+1, jy+(-s*sa-s*ca)+1.5);
      ctx.lineTo(jx+( s*ca+s*(-sa))+1, jy+( s*sa+s*ca)+1.5);
      ctx.moveTo(jx+( s*ca-s*(-sa))+1, jy+( s*sa-s*ca)+1.5);
      ctx.lineTo(jx+(-s*ca+s*(-sa))+1, jy+(-s*sa+s*ca)+1.5);
      ctx.stroke();
      // main white cross with wobble
      ctx.strokeStyle='rgba(255,255,255,0.97)'; ctx.lineWidth=sz*0.45;
      ctx.beginPath();
      ctx.moveTo(jx+(-s*ca-s*(-sa)), jy+(-s*sa-s*ca));
      ctx.lineTo(jx+( s*ca+s*(-sa)), jy+( s*sa+s*ca));
      ctx.moveTo(jx+( s*ca-s*(-sa)), jy+( s*sa-s*ca));
      ctx.lineTo(jx+(-s*ca+s*(-sa)), jy+(-s*sa+s*ca));
      ctx.stroke();
    }
  }
}

function render(cityName, lat, lon, geojson) {
  ctx.clearRect(0, 0, W, H);

  // Stamp dimensions
  var margin = 30;
  var sx = margin, sy = margin;
  var sw = W - margin * 2, sh = H - margin * 2;
  var cornerR = 14;
  var holeR = 18;

  // ── Morandi color from lat/lon ──
  var idx = Math.abs(Math.round(lat + lon)) % morandiColors.length;
  var mc = morandiColors[idx];
  var stampH = mc[0], stampS = mc[1], stampL = mc[2];
  var stampColor = 'hsl(' + stampH + ',' + stampS + '%,' + stampL + '%)';

  // ── Drop shadow ──
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.45)';
  ctx.shadowBlur = 24;
  ctx.shadowOffsetX = 4;
  ctx.shadowOffsetY = 8;
  drawStampShape(sx, sy, sw, sh, cornerR, holeR);
  ctx.fillStyle = stampColor;
  ctx.fill();
  ctx.restore();

  // ── Stamp fill + fabric texture (clipped) ──
  ctx.save();
  drawStampShape(sx, sy, sw, sh, cornerR, holeR);
  ctx.clip();

  // Base color fill
  ctx.fillStyle = stampColor;
  ctx.fillRect(sx, sy, sw, sh);

  // ── Fabric texture: 8px grid, checkerboard ±8% lightness rectangles ──
  var gridSize = 8;
  var cellDot = 3;
  var lLight = Math.min(100, stampL + 8);
  var lDark  = Math.max(0,   stampL - 8);
  for (var ty = sy; ty < sy + sh; ty += gridSize) {
    var rowIdx = Math.floor((ty - sy) / gridSize);
    for (var tx = sx; tx < sx + sw; tx += gridSize) {
      var colIdx = Math.floor((tx - sx) / gridSize);
      var isLight = (rowIdx + colIdx) % 2 === 0;
      ctx.fillStyle = isLight
        ? 'hsl(' + stampH + ',' + stampS + '%,' + lLight + '%)'
        : 'hsl(' + stampH + ',' + stampS + '%,' + lDark  + '%)';
      var dotX = tx + (gridSize - cellDot) / 2;
      var dotY = ty + (gridSize - cellDot) / 2;
      ctx.fillRect(dotX, dotY, cellDot, cellDot);
    }
  }

  // ── Diagonal weave lines at 45° ──
  ctx.save();
  ctx.strokeStyle = 'rgba(0,0,0,0.08)';
  ctx.lineWidth = 1;
  var diag = sw + sh;
  for (var d = -diag; d < diag; d += 12) {
    ctx.beginPath();
    ctx.moveTo(sx + d, sy);
    ctx.lineTo(sx + d + sh, sy + sh);
    ctx.stroke();
  }
  ctx.restore();

  ctx.restore();

  // ── City outline (embroidered) ──
  if (geojson) {
    var ring = [];
    if (geojson.type === 'Polygon') {
      ring = geojson.coordinates[0];
    } else if (geojson.type === 'MultiPolygon') {
      var best = null, bestLen = 0;
      geojson.coordinates.forEach(function(poly) {
        if (poly[0].length > bestLen) { bestLen = poly[0].length; best = poly[0]; }
      });
      ring = best || [];
    }

    if (ring.length > 2) {
      ring = dp(ring, 0.05);

      var minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
      ring.forEach(function(p) {
        if (p[0] < minX) minX = p[0];
        if (p[0] > maxX) maxX = p[0];
        if (p[1] < minY) minY = p[1];
        if (p[1] > maxY) maxY = p[1];
      });

      var targetW = sw * 0.65;
      var targetH = sh * 0.55;
      var scX = targetW / (maxX - minX || 1);
      var scY = targetH / (maxY - minY || 1);
      var sc = Math.min(scX, scY);

      var midLng = (minX + maxX) / 2;
      var midLat = (minY + maxY) / 2;

      var shapeCX = sx + sw / 2;
      var shapeCY = sy + sh * 0.54; // moved down

      var mapped = ring.map(function(p) {
        return [
          shapeCX + (p[0] - midLng) * sc,
          shapeCY - (p[1] - midLat) * sc
        ];
      });

      var shapeCmds = buildSmooth(mapped);

      // Resample smooth path into dense point array via CatmullRom
      var smoothPts = (function(){
        var pts = mapped;
        var out = [];
        var n = pts.length;
        for(var i=0;i<n;i++){
          var p0=pts[(i-1+n)%n], p1=pts[i], p2=pts[(i+1)%n], p3=pts[(i+2)%n];
          for(var t=0;t<1;t+=0.05){
            var t2=t*t, t3=t2*t;
            var x=0.5*((2*p1[0])+(-p0[0]+p2[0])*t+(2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*t2+(-p0[0]+3*p1[0]-3*p2[0]+p3[0])*t3);
            var y=0.5*((2*p1[1])+(-p0[1]+p2[1])*t+(2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*t2+(-p0[1]+3*p1[1]-3*p2[1]+p3[1])*t3);
            out.push([x,y]);
          }
        }
        return out;
      })();

      ctx.save();
      drawStampShape(sx, sy, sw, sh, cornerR, holeR);
      ctx.clip();

      // Fill interior with slightly lighter overlay
      applyPath(shapeCmds, 0, 0);
      ctx.fillStyle = 'rgba(255,255,255,0.10)';
      ctx.fill();

      // Stitch embroidery along outline points
      stitchOutline(smoothPts, 5);

      ctx.restore();
    }
  }

  // ── Inner border frame (18px inset, embroidery stitch style) ──
  ctx.save();
  drawStampShape(sx, sy, sw, sh, cornerR, holeR);
  ctx.clip();

  var fi = 22; // inset amount
  embroideryStroke(function() {
    ctx.beginPath();
    ctx.rect(sx + fi, sy + fi, sw - fi * 2, sh - fi * 2);
  }, 3);

  ctx.restore();

  // ── Stamp text area ──
  ctx.save();
  drawStampShape(sx, sy, sw, sh, cornerR, holeR);
  ctx.clip();

  // City name — top center, embroidery style
  var displayName = cityName.toUpperCase();
  var fontSize = displayName.length > 14 ? 36 : displayName.length > 10 ? 44 : 52;
  var nameY = sy + 72;
  embroideryText(displayName, sx + sw / 2, nameY, '800 ' + fontSize + 'px Outfit,sans-serif', 'center');

  // Thin stitch line below name
  var lineY2 = nameY + 16;
  embroideryStroke(function() {
    ctx.beginPath();
    ctx.moveTo(sx + sw*0.15, lineY2);
    ctx.lineTo(sx + sw*0.85, lineY2);
  }, 1.5);

  ctx.restore();

  // ── Stamp perimeter outline (subtle) ──
  ctx.save();
  drawStampShape(sx, sy, sw, sh, cornerR, holeR);
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.restore();

  document.getElementById('canvas-wrap').style.display = 'flex';
  setStatus('✅  ' + cityName);
}

genBtn.addEventListener('click', go);
document.getElementById('dl-btn').addEventListener('click', function() {
  var a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = 'citybadge.png';
  a.click();
});
</script>
</body>
</html>
