<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stitch It</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#1a1a2e; color:#e8e0d0; font-family:system-ui,sans-serif; height:100vh; overflow:hidden; display:flex; flex-direction:column; }

#topbar {
  height:44px; background:#0d0d1a; border-bottom:1px solid #2a2a3e;
  display:flex; align-items:center; padding:0 12px; gap:8px; flex-shrink:0;
}
.app-title { font-size:15px; font-weight:600; letter-spacing:0.05em; color:#c8b8e8; margin-right:8px; }
.sep { width:1px; height:20px; background:#2a2a3e; margin:0 4px; }
.act-btn {
  font-size:11px; padding:3px 9px; border-radius:4px; border:1px solid #3a3a5e;
  background:none; color:#a0a0c0; cursor:pointer; white-space:nowrap;
}
.act-btn:hover { border-color:#8070c0; color:#c8b8e8; }
.act-btn.active { border-color:#8070c0; color:#c8b8e8; background:#2a1a4a; }

#main { display:flex; flex:1; overflow:hidden; }

/* Left: draw panel */
#left {
  width:420px; flex-shrink:0; position:relative;
  background:#111122; border-right:1px solid #2a2a3e;
  display:flex; flex-direction:column;
}
#draw-canvas { display:block; width:100%; height:100%; cursor:crosshair; }

/* Tool bar floating */
#tool-bar {
  position:absolute; left:8px; top:8px;
  display:flex; flex-direction:column; gap:4px; z-index:10;
}
.tool-btn {
  width:32px; height:32px; border-radius:6px; border:1px solid #3a3a5e;
  background:#0d0d1a; color:#8080a0; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.tool-btn:hover { border-color:#8070c0; color:#c8b8e8; }
.tool-btn.active { border-color:#8070c0; color:#c8b8e8; background:#2a1a4a; }
.tool-btn svg { width:16px; height:16px; }

/* Right: preview panel */
#right {
  flex:1; position:relative; background:#0d0d1a;
  display:flex; align-items:center; justify-content:center;
}
#preview-canvas { display:block; image-rendering:pixelated; }

/* Light control */
#light-ctrl {
  position:absolute; bottom:16px; right:16px;
  background:#0d0d1a; border:1px solid #2a2a3e; border-radius:8px;
  padding:10px 12px; display:flex; flex-direction:column; gap:8px;
  font-size:11px; color:#7070a0; min-width:160px;
}
#light-ctrl label { display:flex; justify-content:space-between; align-items:center; }
#light-ctrl input[type=range] { width:90px; accent-color:#8070c0; }
#light-globe {
  width:60px; height:60px; border-radius:50%; background:#1a1a2e; border:1px solid #3a3a5e;
  position:relative; cursor:crosshair; align-self:center; margin-top:2px;
}
#light-dot {
  width:10px; height:10px; border-radius:50%; background:#ffe080;
  position:absolute; transform:translate(-50%,-50%);
  box-shadow:0 0 6px #ffe08088;
  pointer-events:none;
}

/* Fabric controls */
#fabric-ctrl {
  position:absolute; top:12px; right:12px;
  background:#0d0d1a; border:1px solid #2a2a3e; border-radius:8px;
  padding:10px 12px; display:flex; flex-direction:column; gap:6px;
  font-size:11px; color:#7070a0; min-width:150px;
}
#fabric-ctrl label { display:flex; justify-content:space-between; align-items:center; }
#fabric-ctrl input[type=range] { width:80px; accent-color:#8070c0; }
#fabric-ctrl select {
  background:#111122; border:1px solid #3a3a5e; color:#a0a0c0;
  font-size:10px; border-radius:3px; padding:2px 4px; width:90px;
}
.swatch { width:14px; height:14px; border-radius:3px; border:1px solid #3a3a5e; cursor:pointer; }
</style>
</head>
<body>

<div id="topbar">
  <span class="app-title">Stitch It</span>
  <div class="sep"></div>
  <button class="act-btn active" id="btn-clear-draw">Clear</button>
  <button class="act-btn" id="btn-undo">Undo</button>
  <div class="sep"></div>
  <button class="act-btn" id="btn-export-png" style="border-color:#a0e0a0;color:#a0e0a0;">Export PNG</button>
</div>

<div id="main">
  <!-- Left draw panel -->
  <div id="left">
    <canvas id="draw-canvas"></canvas>
    <div id="tool-bar">
      <button class="tool-btn active" data-tool="brush" title="Brush (B)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 13 C4 10 9 5 13 3" stroke-linecap="round"/>
          <circle cx="3" cy="13" r="1.5" fill="currentColor" stroke="none"/>
        </svg>
      </button>
      <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="7" width="8" height="5" rx="1"/>
          <path d="M10 12 L14 4" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Right preview panel -->
  <div id="right">
    <canvas id="preview-canvas"></canvas>

    <!-- Fabric controls -->
    <div id="fabric-ctrl">
      <div style="font-weight:600;color:#c8b8e8;margin-bottom:2px;">Fabric</div>
      <label>Style
        <select id="sel-mesh">
          <option value="hex">Hexagonal</option>
          <option value="square">Square</option>
          <option value="dot">Dot tulle</option>
          <option value="none">None</option>
        </select>
      </label>
      <label>Mesh size <input type="range" id="rng-mesh-size" min="3" max="20" value="7"></label>
      <label>Opacity <input type="range" id="rng-mesh-op" min="0" max="100" value="35"></label>
      <div class="sep" style="background:#2a2a3e;height:1px;"></div>
      <div style="font-weight:600;color:#c8b8e8;margin-top:2px;">Thread</div>
      <label>Width <input type="range" id="rng-thread-w" min="2" max="20" value="6"></label>
      <label>Color <input type="color" id="clr-thread" value="#f0ece4" style="width:90px;height:20px;border:none;background:none;cursor:pointer;"></label>
      <label>Bg color <input type="color" id="clr-bg" value="#0a0a18" style="width:90px;height:20px;border:none;background:none;cursor:pointer;"></label>
      <label>Tile
        <select id="sel-tile">
          <option value="repeat">Repeat</option>
          <option value="brick">Brick offset</option>
          <option value="mirror">Mirror</option>
          <option value="single">Single</option>
        </select>
      </label>
    </div>

    <!-- Light controls -->
    <div id="light-ctrl">
      <div style="font-weight:600;color:#c8b8e8;margin-bottom:2px;">Light</div>
      <div id="light-globe"><div id="light-dot" style="left:70%;top:25%;"></div></div>
      <label>Height <input type="range" id="rng-light-h" min="0" max="100" value="60"></label>
      <label>Intensity <input type="range" id="rng-light-i" min="0" max="200" value="120"></label>
      <label>Ambient <input type="range" id="rng-amb" min="0" max="100" value="30"></label>
    </div>
  </div>
</div>

<script>
// ─── DRAW CANVAS ──────────────────────────────────────────────────────────────
const drawCanvas = document.getElementById('draw-canvas');
const dc = drawCanvas.getContext('2d');
let strokes = [];
let currentStroke = [];
let drawMode = 'brush';
let isDrawing = false;
let eraserRadius = 18;

function resizeDrawCanvas() {
  const r = drawCanvas.parentElement.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio, 2);
  drawCanvas.width  = r.width  * dpr;
  drawCanvas.height = r.height * dpr;
  drawCanvas.style.width  = r.width  + 'px';
  drawCanvas.style.height = r.height + 'px';
  dc.scale(dpr, dpr);
  redrawStrokes();
}

function getPos(e) {
  const r = drawCanvas.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio, 2);
  const cx = e.clientX - r.left;
  const cy = e.clientY - r.top;
  const pressure = e.pressure > 0 ? e.pressure : 0.5;
  const w = pressure * parseFloat(document.getElementById('rng-thread-w').value);
  return { x: cx, y: cy, w: Math.max(1, w) };
}

function drawStroke(stroke, alpha) {
  if (!stroke || stroke.pts.length < 2) return;
  const pts = stroke.pts;
  const threadW = parseFloat(document.getElementById('rng-thread-w').value);
  const color = document.getElementById('clr-thread').value;

  dc.save();
  dc.globalAlpha = alpha;
  dc.lineCap = 'round';
  dc.lineJoin = 'round';
  dc.strokeStyle = color;

  // Draw main thread line
  for (let i = 1; i < pts.length; i++) {
    const p0 = pts[i-1], p1 = pts[i];
    const w = ((p0.w + p1.w) / 2) || threadW;
    dc.beginPath();
    dc.lineWidth = w;
    dc.moveTo(p0.x, p0.y);
    dc.lineTo(p1.x, p1.y);
    dc.stroke();
  }

  // Highlight pass — simulates thread sheen
  dc.globalAlpha = alpha * 0.35;
  dc.strokeStyle = '#ffffff';
  for (let i = 1; i < pts.length; i++) {
    const p0 = pts[i-1], p1 = pts[i];
    const w = ((p0.w + p1.w) / 2) || threadW;
    dc.beginPath();
    dc.lineWidth = Math.max(1, w * 0.3);
    dc.moveTo(p0.x, p0.y);
    dc.lineTo(p1.x, p1.y);
    dc.stroke();
  }

  dc.restore();
}

function redrawStrokes() {
  const r = drawCanvas.getBoundingClientRect();
  dc.clearRect(0, 0, r.width, r.height);

  // Draw canvas grid guide
  dc.save();
  dc.strokeStyle = '#2a2a4a';
  dc.lineWidth = 0.5;
  const cw = r.width, ch = r.height;
  dc.strokeRect(0, 0, cw, ch);
  dc.restore();

  for (const s of strokes) drawStroke(s, 1.0);
  if (currentStroke.length > 1) drawStroke({ pts: currentStroke }, 0.7);

  // Schedule preview update
  schedulePreview();
}

// Pointer events
drawCanvas.addEventListener('pointerdown', e => {
  if (e.button !== 0) return;
  isDrawing = true;
  const p = getPos(e);
  if (drawMode === 'brush') {
    currentStroke = [p];
    redrawStrokes();
  } else if (drawMode === 'eraser') {
    eraseAt(p);
  }
});

drawCanvas.addEventListener('pointermove', e => {
  if (!isDrawing) return;
  const p = getPos(e);
  if (drawMode === 'brush') {
    currentStroke.push(p);
    redrawStrokes();
  } else if (drawMode === 'eraser') {
    eraseAt(p);
  }
});

drawCanvas.addEventListener('pointerup', e => {
  if (!isDrawing) return;
  isDrawing = false;
  if (drawMode === 'brush' && currentStroke.length > 1) {
    strokes.push({ pts: [...currentStroke] });
    currentStroke = [];
    redrawStrokes();
    saveDraft();
  }
});

drawCanvas.addEventListener('pointerleave', e => {
  if (isDrawing && drawMode === 'brush' && currentStroke.length > 1) {
    strokes.push({ pts: [...currentStroke] });
    currentStroke = [];
    isDrawing = false;
    redrawStrokes();
    saveDraft();
  }
});

function eraseAt(p) {
  const r2 = eraserRadius * eraserRadius;
  const next = [];
  for (const s of strokes) {
    const hit = s.pts.some(q => (q.x-p.x)**2 + (q.y-p.y)**2 < r2);
    if (!hit) next.push(s);
  }
  strokes = next;
  redrawStrokes();
}

// Undo
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
    strokes.pop(); redrawStrokes(); saveDraft();
  }
  const map = { b:'brush', e:'eraser' };
  const m = map[e.key.toLowerCase()];
  if (m && e.target.tagName !== 'INPUT') setTool(m);
});

document.getElementById('btn-undo').addEventListener('click', () => { strokes.pop(); redrawStrokes(); saveDraft(); });
document.getElementById('btn-clear-draw').addEventListener('click', () => {
  strokes = []; currentStroke = []; redrawStrokes(); localStorage.removeItem('stitchit_v1');
});

document.querySelectorAll('.tool-btn').forEach(b => b.addEventListener('click', () => setTool(b.dataset.tool)));
function setTool(t) {
  drawMode = t;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === t));
  drawCanvas.style.cursor = t === 'eraser' ? 'cell' : 'crosshair';
}

// ─── PREVIEW / WebGL ─────────────────────────────────────────────────────────
const previewCanvas = document.getElementById('preview-canvas');
const gl = previewCanvas.getContext('webgl2');

const VS = `#version 300 es
in vec2 aPos;
out vec2 vUV;
void main() { vUV = aPos*0.5+0.5; gl_Position = vec4(aPos,0,1); }
`;

const FS = `#version 300 es
precision highp float;
in vec2 vUV;
out vec4 fragColor;

uniform sampler2D uDraw;     // draw canvas (thread strokes)
uniform vec2 uRes;
uniform float uMeshSize;
uniform float uMeshOp;
uniform int uMeshType;       // 0=hex 1=square 2=dot 3=none
uniform vec3 uLightDir;      // normalized
uniform float uLightI;
uniform float uAmb;
uniform vec3 uBgColor;
uniform vec3 uThreadColor;

// Hex grid SDF
float hexDist(vec2 p) {
  p = abs(p);
  float c = dot(p, normalize(vec2(1.0, 1.732)));
  c = max(c, p.x);
  return c;
}

float hexGrid(vec2 uv, float sz) {
  vec2 r = vec2(1.0, 1.732);
  vec2 h = r * 0.5;
  vec2 a = mod(uv*sz, r) - h;
  vec2 b = mod(uv*sz - h, r) - h;
  float da = hexDist(a);
  float db = hexDist(b);
  float d = min(da, db);
  return smoothstep(0.42, 0.46, d);
}

float squareGrid(vec2 uv, float sz) {
  vec2 g = fract(uv * sz);
  float lx = smoothstep(0.0, 0.04, g.x) * smoothstep(1.0, 0.96, g.x);
  float ly = smoothstep(0.0, 0.04, g.y) * smoothstep(1.0, 0.96, g.y);
  return 1.0 - (1.0-lx)*(1.0-ly);
}

float dotTulle(vec2 uv, float sz) {
  vec2 g = fract(uv * sz) - 0.5;
  float d = length(g);
  return 1.0 - smoothstep(0.15, 0.25, d);
}

// Normal from height map (Sobel)
vec3 calcNormal(sampler2D tex, vec2 uv, vec2 px) {
  float tl = texture(tex, uv + px*vec2(-1,-1)).a;
  float t  = texture(tex, uv + px*vec2( 0,-1)).a;
  float tr = texture(tex, uv + px*vec2( 1,-1)).a;
  float l  = texture(tex, uv + px*vec2(-1, 0)).a;
  float r  = texture(tex, uv + px*vec2( 1, 0)).a;
  float bl = texture(tex, uv + px*vec2(-1, 1)).a;
  float b  = texture(tex, uv + px*vec2( 0, 1)).a;
  float br = texture(tex, uv + px*vec2( 1, 1)).a;
  float dx = (tr + 2.0*r + br) - (tl + 2.0*l + bl);
  float dy = (bl + 2.0*b + br) - (tl + 2.0*t + tr);
  return normalize(vec3(-dx * 4.0, -dy * 4.0, 1.0));
}

void main() {
  vec2 px = 1.0 / uRes;
  vec4 draw = texture(uDraw, vUV);
  float threadMask = draw.a;

  // Mesh/tulle background
  float mesh = 0.0;
  if (uMeshType == 0) mesh = hexGrid(vUV, uMeshSize);
  else if (uMeshType == 1) mesh = squareGrid(vUV, uMeshSize);
  else if (uMeshType == 2) mesh = dotTulle(vUV, uMeshSize * 1.5);

  // Normal map from thread alpha
  vec3 N = calcNormal(uDraw, vUV, px * 2.0);

  // Lighting
  vec3 L = normalize(uLightDir);
  float diff = max(dot(N, L), 0.0);
  float spec = pow(max(dot(reflect(-L, N), vec3(0,0,1)), 0.0), 32.0);
  float light = uAmb/100.0 + diff * (uLightI/100.0) + spec * (uLightI/100.0) * 0.4;

  // Thread color with lighting
  vec3 tCol = uThreadColor * light;

  // Mesh color (slightly lighter than bg, lit)
  float meshLight = uAmb/100.0 + diff * 0.15;
  vec3 meshCol = uBgColor + vec3(0.12,0.12,0.15) * meshLight;

  // Blend: bg → mesh → thread
  vec3 col = uBgColor;
  col = mix(col, meshCol, mesh * (uMeshOp/100.0));
  col = mix(col, tCol, threadMask);

  fragColor = vec4(col, 1.0);
}
`;

function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}
function linkProg(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, vs); gl.attachShader(p, fs);
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) console.error(gl.getProgramInfoLog(p));
  return p;
}

const prog = linkProg(compileShader(gl.VERTEX_SHADER, VS), compileShader(gl.FRAGMENT_SHADER, FS));
gl.useProgram(prog);

const quad = new Float32Array([-1,-1,1,-1,-1,1,1,1]);
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, quad, gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'aPos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

// Uniforms
const uLocs = {};
['uDraw','uRes','uMeshSize','uMeshOp','uMeshType','uLightDir','uLightI','uAmb','uBgColor','uThreadColor'].forEach(n => {
  uLocs[n] = gl.getUniformLocation(prog, n);
});

// Draw canvas texture
const drawTex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, drawTex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16)/255;
  const g = parseInt(hex.slice(3,5),16)/255;
  const b = parseInt(hex.slice(5,7),16)/255;
  return [r,g,b];
}

// Light globe interaction
let lightX = 0.7, lightY = 0.25;
const globe = document.getElementById('light-globe');
const dot = document.getElementById('light-dot');

function updateLightDot() {
  dot.style.left = (lightX * 100) + '%';
  dot.style.top  = (lightY * 100) + '%';
}

globe.addEventListener('pointerdown', e => {
  globe.setPointerCapture(e.pointerId);
  updateLightFromEvent(e);
});
globe.addEventListener('pointermove', e => {
  if (e.buttons !== 1) return;
  updateLightFromEvent(e);
});
function updateLightFromEvent(e) {
  const r = globe.getBoundingClientRect();
  lightX = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
  lightY = Math.max(0, Math.min(1, (e.clientY - r.top) / r.height));
  updateLightDot();
  renderPreview();
}

// Tile the draw canvas content
let _tileCanvas = null;
function buildTileCanvas(srcCanvas, tileMode, pw, ph) {
  if (!_tileCanvas) _tileCanvas = document.createElement('canvas');
  _tileCanvas.width  = pw;
  _tileCanvas.height = ph;
  const ctx = _tileCanvas.getContext('2d');
  ctx.clearRect(0, 0, pw, ph);

  const sw = srcCanvas.width / Math.min(window.devicePixelRatio, 2);
  const sh = srcCanvas.height / Math.min(window.devicePixelRatio, 2);

  if (tileMode === 'single') {
    ctx.drawImage(srcCanvas, 0, 0, sw, sh, 0, 0, pw, ph);
    return _tileCanvas;
  }

  const cols = Math.ceil(pw / sw) + 2;
  const rows = Math.ceil(ph / sh) + 2;

  for (let row = 0; row < rows; row++) {
    for (let col = 0; col < cols; col++) {
      let sx = col * sw, sy = row * sh;
      let flipX = false, flipY = false;
      if (tileMode === 'mirror') { flipX = col % 2 === 1; flipY = row % 2 === 1; }
      if (tileMode === 'brick') { if (row % 2 === 1) sx -= sw * 0.5; }

      ctx.save();
      ctx.translate(sx + (flipX ? sw : 0), sy + (flipY ? sh : 0));
      ctx.scale(flipX ? -1 : 1, flipY ? -1 : 1);
      ctx.drawImage(srcCanvas, 0, 0, sw, sh, 0, 0, sw, sh);
      ctx.restore();
    }
  }
  return _tileCanvas;
}

function resizePreview() {
  const r = document.getElementById('right').getBoundingClientRect();
  const size = Math.min(r.width - 180, r.height - 20);
  previewCanvas.width  = size;
  previewCanvas.height = size;
  previewCanvas.style.width  = size + 'px';
  previewCanvas.style.height = size + 'px';
  gl.viewport(0, 0, size, size);
  renderPreview();
}

let _previewRaf = null;
function schedulePreview() {
  if (_previewRaf) return;
  _previewRaf = requestAnimationFrame(() => { _previewRaf = null; renderPreview(); });
}

function renderPreview() {
  const pw = previewCanvas.width, ph = previewCanvas.height;
  const tileMode = document.getElementById('sel-tile').value;
  const tiled = buildTileCanvas(drawCanvas, tileMode, pw, ph);

  // Upload to texture
  gl.bindTexture(gl.TEXTURE_2D, drawTex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, tiled);

  // Set uniforms
  gl.uniform1i(uLocs.uDraw, 0);
  gl.uniform2f(uLocs.uRes, pw, ph);
  gl.uniform1f(uLocs.uMeshSize, parseFloat(document.getElementById('rng-mesh-size').value));
  gl.uniform1f(uLocs.uMeshOp, parseFloat(document.getElementById('rng-mesh-op').value));
  const meshMap = { hex: 0, square: 1, dot: 2, none: 3 };
  gl.uniform1i(uLocs.uMeshType, meshMap[document.getElementById('sel-mesh').value] ?? 0);

  // Light dir from globe position
  const lx = (lightX - 0.5) * 2;
  const ly = -(lightY - 0.5) * 2;
  const lz = parseFloat(document.getElementById('rng-light-h').value) / 100;
  const len = Math.sqrt(lx*lx + ly*ly + lz*lz) || 1;
  gl.uniform3f(uLocs.uLightDir, lx/len, ly/len, lz/len);
  gl.uniform1f(uLocs.uLightI, parseFloat(document.getElementById('rng-light-i').value));
  gl.uniform1f(uLocs.uAmb, parseFloat(document.getElementById('rng-amb').value));

  const bg = hexToRgb(document.getElementById('clr-bg').value);
  const th = hexToRgb(document.getElementById('clr-thread').value);
  gl.uniform3f(uLocs.uBgColor, bg[0], bg[1], bg[2]);
  gl.uniform3f(uLocs.uThreadColor, th[0], th[1], th[2]);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// ─── CONTROLS ────────────────────────────────────────────────────────────────
['sel-mesh','rng-mesh-size','rng-mesh-op','rng-thread-w','clr-thread','clr-bg','sel-tile',
 'rng-light-h','rng-light-i','rng-amb'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => renderPreview());
});

// ─── EXPORT ──────────────────────────────────────────────────────────────────
document.getElementById('btn-export-png').addEventListener('click', () => {
  renderPreview();
  previewCanvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'stitchit.png';
    a.click();
  });
});

// ─── LOCALSTORAGE ────────────────────────────────────────────────────────────
const LS_KEY = 'stitchit_v1';
function saveDraft() {
  try { localStorage.setItem(LS_KEY, JSON.stringify(strokes)); } catch(e) {}
}
function loadDraft() {
  try {
    const d = localStorage.getItem(LS_KEY);
    if (d) { strokes = JSON.parse(d); redrawStrokes(); }
  } catch(e) {}
}

// ─── RESIZE ──────────────────────────────────────────────────────────────────
function onResize() {
  resizeDrawCanvas();
  resizePreview();
}
window.addEventListener('resize', onResize);
requestAnimationFrame(() => { onResize(); loadDraft(); });
</script>
</body>
