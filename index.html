<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stitch It</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f0ede8;--pl:#f5f3ef;--pr:#ece9e3;--hdr:#e8e5df;
  --bdr:#d0ccc4;--acc:#6040b0;--txt:#1a1a1a;--txt2:#707070;
  --btn:#e0ddd8;--bth:#d4d1cb;
}
html,body{height:100%;background:var(--bg);color:var(--txt);font:11px/1.4 system-ui,sans-serif;overflow:hidden}
/* ── Topbar ── */
#topbar{
  display:flex;align-items:center;gap:6px;padding:0 10px;
  height:42px;background:var(--hdr);border-bottom:1px solid var(--bdr);
  flex-shrink:0;
}
#topbar .title{font-size:14px;font-weight:700;color:var(--acc);letter-spacing:.04em;margin-right:8px}
#topbar select,#topbar input[type=checkbox]{accent-color:var(--acc)}
#topbar select{background:var(--btn);color:var(--txt);border:1px solid var(--bdr);border-radius:4px;padding:2px 4px;cursor:pointer}
.tbtn{
  background:var(--btn);color:var(--txt);border:1px solid var(--bdr);
  border-radius:4px;padding:3px 9px;cursor:pointer;font-size:11px;
  white-space:nowrap;
}
.tbtn:hover{background:var(--bth);border-color:var(--acc)}
.sep{width:1px;height:22px;background:var(--bdr);margin:0 2px}
label.chk{display:flex;align-items:center;gap:4px;cursor:pointer;color:var(--txt2)}
/* ── Main layout ── */
#main{display:flex;flex:1;height:calc(100vh - 42px);overflow:hidden}
/* ── Left panel ── */
#left-panel{
  width:380px;min-width:380px;background:var(--pl);
  border-right:1px solid var(--bdr);display:flex;flex-direction:column;
  overflow:hidden;
}
#svg-wrap{
  flex:1;position:relative;display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#svg-canvas{
  display:block;width:100%;height:100%;
  max-width:360px;max-height:360px;
  cursor:crosshair;
}
/* toolbar floating */
#tool-bar{
  position:absolute;left:8px;top:50%;transform:translateY(-50%);
  display:flex;flex-direction:column;gap:4px;z-index:10;
}
.tool-btn{
  width:30px;height:30px;background:var(--btn);border:1px solid var(--bdr);
  border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-size:13px;color:var(--txt2);transition:background .15s,border-color .15s;
  position:relative;
}
.tool-btn:hover{background:var(--bth);color:var(--txt)}
.tool-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
/* color bar */
#color-bar{
  height:44px;background:var(--hdr);border-top:1px solid var(--bdr);
  display:flex;align-items:center;gap:8px;padding:0 10px;flex-shrink:0;
}
.swatch{width:22px;height:22px;border-radius:4px;border:2px solid var(--bdr);cursor:pointer;flex-shrink:0}
.swatch:hover{border-color:var(--acc)}
input[type=color]{width:0;height:0;opacity:0;position:absolute;pointer-events:none}
#color-bar label{color:var(--txt2);display:flex;align-items:center;gap:4px}
#sw-slider{width:70px;accent-color:var(--acc)}
#fill-toggle{accent-color:var(--acc)}
/* ── Right panel ── */
#right-panel{
  flex:1;background:var(--pr);display:flex;flex-direction:column;overflow:hidden;
}
#tile-bar{
  height:36px;background:var(--hdr);border-bottom:1px solid var(--bdr);
  display:flex;align-items:center;gap:4px;padding:0 10px;flex-shrink:0;
}
.tile-btn,.cnt-btn{
  background:var(--btn);color:var(--txt);border:1px solid var(--bdr);
  border-radius:4px;padding:2px 8px;cursor:pointer;font-size:11px;
}
.tile-btn:hover,.cnt-btn:hover{background:var(--bth)}
.tile-btn.active,.cnt-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
.sep-v{width:1px;height:20px;background:var(--bdr);margin:0 2px}
/* gl area */
#gl-area{display:flex;flex:1;overflow:hidden}
#gl-wrap{
  flex:1;display:flex;align-items:center;justify-content:center;
  overflow:hidden;
}
#gl-canvas{
  display:block;
  width:auto;height:auto;
  max-width:100%;max-height:100%;
  aspect-ratio:1/1;
  image-rendering:auto;
}
/* controls panel */
#ctrl-panel{
  width:180px;min-width:180px;background:var(--hdr);border-left:1px solid var(--bdr);
  display:flex;flex-direction:column;gap:0;overflow-y:auto;
}
.ctrl-section{padding:8px 10px;border-bottom:1px solid var(--bdr)}
.ctrl-section h4{color:var(--txt2);font-size:10px;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
.rgrp{display:flex;flex-wrap:wrap;gap:3px}
.rbtn{
  background:var(--btn);color:var(--txt);border:1px solid var(--bdr);
  border-radius:4px;padding:3px 7px;cursor:pointer;font-size:11px;
}
.rbtn:hover{background:var(--bth)}
.rbtn.active{background:var(--acc);border-color:var(--acc);color:#fff}
.row{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.row label{color:var(--txt2);font-size:10px}
.row input[type=range]{flex:1;margin-left:6px;accent-color:var(--acc)}
#yarn-row{display:none}
/* light globe */
#light-globe-wrap{display:flex;justify-content:center;margin:6px 0}
#light-globe{
  width:60px;height:60px;border-radius:50%;
  background:radial-gradient(circle at 40% 40%,#d0c8e8,#b8b0d0);
  border:1px solid var(--bdr);cursor:crosshair;position:relative;
}
#globe-dot{
  width:10px;height:10px;border-radius:50%;background:#c8a0ff;
  position:absolute;transform:translate(-50%,-50%);pointer-events:none;
  box-shadow:0 0 6px #c8a0ff;
}
input[type=color]#bg-col{width:100%;height:24px;border-radius:4px;border:1px solid var(--bdr);cursor:pointer;background:none;padding:1px}
</style>
</head>
<body>
<!-- ── Topbar ── -->
<div id="topbar">
  <span class="title">Stitch It</span>
  <div class="sep"></div>
  <label style="color:var(--txt2)">Grid
    <select id="grid-sel">
      <option>8</option><option>12</option><option value="16" selected>16</option>
      <option>24</option><option>32</option>
    </select>
  </label>
  <label class="chk"><input type="checkbox" id="snap-chk" checked> Snap</label>
  <div class="sep"></div>
  <button class="tbtn" id="btn-upload">Upload SVG</button>
  <input type="file" id="file-input" accept=".svg,image/svg+xml" style="display:none">
  <div class="sep"></div>
  <button class="tbtn" id="btn-undo">Undo</button>
  <button class="tbtn" id="btn-clear">Clear</button>
  <div class="sep"></div>
  <button class="tbtn" id="btn-export-png">Export PNG</button>
  <button class="tbtn" id="btn-export-svg">Export SVG</button>
</div>

<!-- ── Main ── -->
<div id="main">
  <!-- ── Left Panel ── -->
  <div id="left-panel">
    <div id="svg-wrap">
      <div id="tool-bar">
        <button class="tool-btn active" data-tool="select" title="Select (V)">⊹</button>
        <button class="tool-btn" data-tool="pen" title="Pen (P)">&#9998;</button>
        <button class="tool-btn" data-tool="rect" title="Rect (R)">&#9645;</button>
        <button class="tool-btn" data-tool="circle" title="Circle (C)">&#9711;</button>
        <button class="tool-btn" data-tool="line" title="Line (L)">/</button>
        <button class="tool-btn" data-tool="brush" title="Brush (B)">&#9998;</button>
        <button class="tool-btn" data-tool="fill" title="Fill (F)">&#9724;</button>
        <button class="tool-btn" data-tool="text" title="Text (T)">T</button>
      </div>
      <svg id="svg-canvas" viewBox="0 0 512 512" preserveAspectRatio="xMidYMid meet"
           xmlns="http://www.w3.org/2000/svg">
        <rect id="bg-rect" x="0" y="0" width="512" height="512" fill="#f0ede8"/>
        <g id="grid-layer" style="pointer-events:none"></g>
        <g id="drawing-layer">
          <path id="pen-preview" fill="none" stroke="#7050c0" stroke-width="1.5"
                stroke-dasharray="4 3" style="pointer-events:none"/>
          <rect id="sel-rect" fill="none" stroke="#7050c0" stroke-width="1"
                stroke-dasharray="3 2" style="pointer-events:none" visibility="hidden"/>
          <g id="sel-handles" style="pointer-events:none"></g>
        </g>
      </svg>
      <!-- Text input overlay -->
      <div id="text-overlay" style="display:none;position:absolute;z-index:30;">
        <input id="text-input" type="text" placeholder="Type + Enter"
          style="background:#fff;color:#1a1a1a;border:2px solid #6040b0;
                 border-radius:4px;padding:4px 8px;font-size:14px;outline:none;min-width:120px;box-shadow:0 2px 8px rgba(0,0,0,0.15);">
      </div>
    </div>
    <div id="color-bar">
      <div class="swatch" id="fg-swatch" style="background:#c8c0e0" title="Fill color"></div>
      <input type="color" id="fg-picker" value="#c8c0e0">
      <div class="swatch" id="stroke-swatch" style="background:#7050c0" title="Stroke color"></div>
      <input type="color" id="stroke-picker" value="#7050c0">
      <label>W<input type="range" id="sw-slider" min="1" max="20" value="2"></label>
      <label class="chk" title="Toggle fill"><input type="checkbox" id="fill-toggle" checked> Fill</label>
      <div class="sep-v" style="background:var(--bdr);width:1px;height:16px;margin:0 4px;"></div>
      <label style="color:var(--txt2);">Size</label>
      <input type="range" id="font-sz" min="8" max="120" value="32" style="width:60px;accent-color:var(--acc);">
      <select id="font-style" style="background:var(--btn);color:var(--txt);border:1px solid var(--bdr);border-radius:3px;font-size:10px;padding:1px 3px;">
        <option value="normal">Regular</option>
        <option value="bold">Bold</option>
        <option value="italic">Italic</option>
      </select>
    </div>
  </div>

  <!-- ── Right Panel ── -->
  <div id="right-panel">
    <div id="tile-bar">
      <span style="color:var(--txt2);margin-right:4px">Tile:</span>
      <button class="tile-btn active" data-tm="0">Repeat</button>
      <button class="tile-btn" data-tm="1">Brick</button>
      <button class="tile-btn" data-tm="2">Mirror</button>
      <button class="tile-btn" data-tm="3">Rot90</button>
      <button class="tile-btn" data-tm="4">Hex</button>
      <div class="sep-v"></div>
      <button class="cnt-btn active" data-cnt="3">3&times;</button>
      <button class="cnt-btn" data-cnt="2">2&times;</button>
      <button class="cnt-btn" data-cnt="4">4&times;</button>
      <button class="cnt-btn" data-cnt="5">5&times;</button>
      <div class="sep-v"></div>
      <label class="chk"><input type="checkbox" id="grid-ov"> Grid</label>
    </div>
    <div id="gl-area">
      <div id="gl-wrap">
        <canvas id="gl-canvas"></canvas>
      </div>
      <div id="ctrl-panel">
        <div class="ctrl-section">
          <h4>Render</h4>
          <div class="rgrp">
            <button class="rbtn active" data-rm="0">Flat</button>
            <button class="rbtn" data-rm="3">Weave</button>
          </div>
        </div>
        <div class="ctrl-section" id="yarn-row">
          <h4>Yarn Size</h4>
          <div class="row">
            <label>Size</label>
            <input type="range" id="yarn-sz" min="4" max="28" value="10">
            <span id="yarn-lbl" style="color:var(--txt);margin-left:4px;min-width:18px">10</span>
          </div>
          <h4 style="margin-top:8px;">Weave Unit</h4>
          <div class="rgrp" id="unit-btns">
            <button class="rbtn active" data-unit="0" title="Plain weave (+ cross)">╬</button>
            <button class="rbtn" data-unit="1" title="V shape">∨</button>
            <button class="rbtn" data-unit="2" title="X diagonal">✕</button>
            <button class="rbtn" data-unit="3" title="Herringbone">≋</button>
          </div>
        </div>
        <div class="ctrl-section">
          <h4>Light</h4>
          <div id="light-globe-wrap">
            <div id="light-globe"><div id="globe-dot"></div></div>
          </div>
          <div class="row"><label>Height</label><input type="range" id="lh-sl" min="1" max="100" value="60"></div>
          <div class="row"><label>Intensity</label><input type="range" id="li-sl" min="0" max="200" value="100"></div>
          <div class="row"><label>Ambient</label><input type="range" id="amb-sl" min="0" max="100" value="30"></div>
        </div>
        <div class="ctrl-section">
          <h4>Canvas Bg</h4>
          <input type="color" id="bg-col" value="#f0ede8">
          <h4 style="margin-top:8px;">Preview Bg</h4>
          <input type="color" id="preview-bg-col" value="#e8e4de">
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ──
var svgEl=document.getElementById('svg-canvas');
var gridLayer=document.getElementById('grid-layer');
var drawLayer=document.getElementById('drawing-layer');
var penPreview=document.getElementById('pen-preview');
var selRect=document.getElementById('sel-rect');
var selHandles=document.getElementById('sel-handles');
var glCanvas=document.getElementById('gl-canvas');

var elements=[];
var currentTool='select';
var fgCol='#c8c0e0';
var strokeCol='#7050c0';
var sw=2;
var fillOn=true;
var snapOn=true;
var gridSz=16;
var tileMode=0;
var tileCnt=3;
var renderMode=0;
var yarnSz=10;
var weaveUnit=0;
var gridOv=false;
var bgColor=[0.941,0.929,0.910];
var lightXY=[0.5,0.5];
var lightH=0.6;
var lightI=1.0;
var lightAmb=0.3;

// ── SVG coords ──
function svgPt(e){
  var r=svgEl.getBoundingClientRect();
  return {x:(e.clientX-r.left)/r.width*512,y:(e.clientY-r.top)/r.height*512};
}
function snap(v){
  if(!snapOn) return v;
  var s=512/gridSz;
  return Math.round(v/s)*s;
}

// ── Grid ──
function drawGrid(){
  while(gridLayer.firstChild) gridLayer.removeChild(gridLayer.firstChild);
  var s=512/gridSz;
  for(var i=0;i<=gridSz;i++){
    var v=i*s;
    var lx=document.createElementNS('http://www.w3.org/2000/svg','line');
    lx.setAttribute('x1',v);lx.setAttribute('y1',0);lx.setAttribute('x2',v);lx.setAttribute('y2',512);
    lx.setAttribute('stroke','#252535');lx.setAttribute('stroke-width','0.5');
    gridLayer.appendChild(lx);
    var ly=document.createElementNS('http://www.w3.org/2000/svg','line');
    ly.setAttribute('x1',0);ly.setAttribute('y1',v);ly.setAttribute('x2',512);ly.setAttribute('y2',v);
    ly.setAttribute('stroke','#252535');ly.setAttribute('stroke-width','0.5');
    gridLayer.appendChild(ly);
  }
}
drawGrid();

document.getElementById('grid-sel').addEventListener('change',function(){
  gridSz=parseInt(this.value);
  drawGrid();
});
document.getElementById('snap-chk').addEventListener('change',function(){ snapOn=this.checked; });

// ── Color controls ──
var fgPicker=document.getElementById('fg-picker');
var strokePicker=document.getElementById('stroke-picker');
var swSlider=document.getElementById('sw-slider');
var fillToggle=document.getElementById('fill-toggle');

document.getElementById('fg-swatch').addEventListener('click',function(){ fgPicker.click(); });
document.getElementById('stroke-swatch').addEventListener('click',function(){ strokePicker.click(); });
fgPicker.addEventListener('input',function(){
  fgCol=this.value;
  document.getElementById('fg-swatch').style.background=fgCol;
});
strokePicker.addEventListener('input',function(){
  strokeCol=this.value;
  document.getElementById('stroke-swatch').style.background=strokeCol;
});
swSlider.addEventListener('input',function(){ sw=parseInt(this.value); });
fillToggle.addEventListener('change',function(){ fillOn=this.checked; });

// ── Tools ──
document.querySelectorAll('.tool-btn').forEach(function(b){
  b.addEventListener('click',function(){
    currentTool=this.dataset.tool;
    document.querySelectorAll('.tool-btn').forEach(function(x){ x.classList.remove('active'); });
    this.classList.add('active');
    cancelPen();
  });
});

// Keyboard shortcuts
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT') return;
  var map={v:'select',p:'pen',r:'rect',c:'circle',l:'line',b:'brush',f:'fill',i:'eyedropper',t:'text'};
  var t=map[e.key.toLowerCase()];
  if(t){
    currentTool=t;
    document.querySelectorAll('.tool-btn').forEach(function(x){ x.classList.remove('active'); });
    var btn=document.querySelector('.tool-btn[data-tool="'+t+'"]');
    if(btn) btn.classList.add('active');
    cancelPen();
  }
  if(e.key==='Delete'||e.key==='Backspace'){
    if(currentTool==='select'&&selectedEl){
      removeEl(selectedEl);
      clearSel();
    }
  }
  if(e.key==='z'&&(e.ctrlKey||e.metaKey)) doUndo();
  if(currentTool==='pen'){
    if(e.key==='Enter') commitPen();
    if(e.key==='Escape') cancelPen();
  }
});

// ── Element helpers ──
function applyStyle(el){
  el.setAttribute('fill', fillOn ? fgCol : 'none');
  el.setAttribute('stroke', strokeCol);
  el.setAttribute('stroke-width', sw);
}

function addEl(el,type){
  drawLayer.insertBefore(el, penPreview);
  elements.push({el:el,type:type});
  schedTex();
}

function removeEl(el){
  if(el.parentNode) el.parentNode.removeChild(el);
  for(var i=elements.length-1;i>=0;i--){
    if(elements[i].el===el){ elements.splice(i,1); break; }
  }
  schedTex();
}

function doUndo(){
  if(elements.length===0) return;
  var last=elements.pop();
  if(last.el.parentNode) last.el.parentNode.removeChild(last.el);
  clearSel();
  schedTex();
}

function doClear(){
  elements.forEach(function(item){
    if(item.el.parentNode) item.el.parentNode.removeChild(item.el);
  });
  elements=[];
  clearSel();
  schedTex();
}

document.getElementById('btn-undo').addEventListener('click',doUndo);
document.getElementById('btn-clear').addEventListener('click',doClear);

// ── Selection ──
var selectedEl=null;
function clearSel(){
  selectedEl=null;
  selRect.setAttribute('visibility','hidden');
  while(selHandles.firstChild) selHandles.removeChild(selHandles.firstChild);
}
function showSel(el){
  selectedEl=el;
  try{
    var bb=el.getBBox();
    selRect.setAttribute('x',bb.x-2);selRect.setAttribute('y',bb.y-2);
    selRect.setAttribute('width',bb.width+4);selRect.setAttribute('height',bb.height+4);
    selRect.setAttribute('visibility','visible');
  }catch(ex){ clearSel(); }
}

// ── elAtPoint helper ──
function elAtPoint(x,y){
  var hits=[];
  elements.forEach(function(item){
    try{
      var bb=item.el.getBBox();
      if(x>=bb.x&&x<=bb.x+bb.width&&y>=bb.y&&y<=bb.y+bb.height) hits.push(item.el);
    }catch(ex){}
  });
  return hits.length ? hits[hits.length-1] : null;
}

// ── Drawing state ──
var isDragging=false;
var dragStart={x:0,y:0};
var currentEl=null;
var dragOffset={x:0,y:0};
var brushPath='';

// Pen state
var penAnchors=[];
var penHandles=[];
var penDragging=false;
var penDragHandle=null;

function updatePenPreview(){
  if(penAnchors.length===0){ penPreview.setAttribute('d',''); return; }
  var d='M '+penAnchors[0].x+' '+penAnchors[0].y;
  for(var i=1;i<penAnchors.length;i++){
    var prev=penAnchors[i-1];
    var cur=penAnchors[i];
    var ph=penHandles[i-1];
    var ch=penHandles[i];
    var phx=prev.x+(ph?ph.ox:0), phy=prev.y+(ph?ph.oy:0);
    var chx=cur.x-(ch?ch.ox:0), chy=cur.y-(ch?ch.oy:0);
    d+=' C '+phx+' '+phy+' '+chx+' '+chy+' '+cur.x+' '+cur.y;
  }
  penPreview.setAttribute('d',d);
}

function commitPen(){
  if(penAnchors.length<2){ cancelPen(); return; }
  var d='M '+penAnchors[0].x+' '+penAnchors[0].y;
  for(var i=1;i<penAnchors.length;i++){
    var prev=penAnchors[i-1];
    var cur=penAnchors[i];
    var ph=penHandles[i-1];
    var ch=penHandles[i];
    var phx=prev.x+(ph?ph.ox:0), phy=prev.y+(ph?ph.oy:0);
    var chx=cur.x-(ch?ch.ox:0), chy=cur.y-(ch?ch.oy:0);
    d+=' C '+phx+' '+phy+' '+chx+' '+chy+' '+cur.x+' '+cur.y;
  }
  var pathEl=document.createElementNS('http://www.w3.org/2000/svg','path');
  pathEl.setAttribute('d',d);
  applyStyle(pathEl);
  addEl(pathEl,'pen');
  cancelPen();
}

function cancelPen(){
  penAnchors=[];
  penHandles=[];
  penDragging=false;
  penDragHandle=null;
  penPreview.setAttribute('d','');
}

// ── Mouse events ──
svgEl.addEventListener('mousedown',function(e){
  if(e.button!==0) return;
  if(currentTool!=='text') e.preventDefault();
  var p=svgPt(e);
  var sx=snap(p.x), sy=snap(p.y);
  isDragging=true;
  dragStart={x:sx,y:sy};

  if(currentTool==='brush'){
    brushPath='M '+sx+' '+sy;
    currentEl=document.createElementNS('http://www.w3.org/2000/svg','path');
    currentEl.setAttribute('d',brushPath);
    currentEl.setAttribute('fill','none');
    currentEl.setAttribute('stroke',fgCol);
    currentEl.setAttribute('stroke-width',sw);
    currentEl.setAttribute('stroke-linecap','round');
    currentEl.setAttribute('stroke-linejoin','round');
    drawLayer.insertBefore(currentEl, penPreview);

  } else if(currentTool==='rect'){
    currentEl=document.createElementNS('http://www.w3.org/2000/svg','rect');
    currentEl.setAttribute('x',sx);currentEl.setAttribute('y',sy);
    currentEl.setAttribute('width',0);currentEl.setAttribute('height',0);
    applyStyle(currentEl);
    drawLayer.insertBefore(currentEl, penPreview);

  } else if(currentTool==='circle'){
    currentEl=document.createElementNS('http://www.w3.org/2000/svg','ellipse');
    currentEl.setAttribute('cx',sx);currentEl.setAttribute('cy',sy);
    currentEl.setAttribute('rx',0);currentEl.setAttribute('ry',0);
    applyStyle(currentEl);
    drawLayer.insertBefore(currentEl, penPreview);

  } else if(currentTool==='line'){
    currentEl=document.createElementNS('http://www.w3.org/2000/svg','line');
    currentEl.setAttribute('x1',sx);currentEl.setAttribute('y1',sy);
    currentEl.setAttribute('x2',sx);currentEl.setAttribute('y2',sy);
    currentEl.setAttribute('stroke',strokeCol);
    currentEl.setAttribute('stroke-width',sw);
    currentEl.setAttribute('fill','none');
    drawLayer.insertBefore(currentEl, penPreview);

  } else if(currentTool==='pen'){
    penDragging=true;
    penDragHandle={ox:0,oy:0};
    penAnchors.push({x:sx,y:sy});
    penHandles.push(penDragHandle);
    updatePenPreview();

  } else if(currentTool==='select'){
    var target=e.target;
    if(target===svgEl||target===document.getElementById('bg-rect')||
       target===selRect||target===gridLayer||target.closest&&target.closest('#grid-layer')){
      clearSel(); return;
    }
    var found=null;
    for(var i=elements.length-1;i>=0;i--){
      if(elements[i].el===target||elements[i].el.contains(target)){
        found=elements[i].el; break;
      }
    }
    if(found){
      showSel(found);
      try{
        var bb2=found.getBBox();
        var cx=bb2.x+bb2.width/2, cy=bb2.y+bb2.height/2;
        dragOffset={x:sx-cx, y:sy-cy};
      }catch(ex){ dragOffset={x:0,y:0}; }
    } else { clearSel(); }

  } else if(currentTool==='fill'){
    var hit=document.elementFromPoint(e.clientX,e.clientY);
    if(!hit||hit===svgEl||hit===document.getElementById('bg-rect')){
      hit=elAtPoint(sx,sy);
    }
    if(hit&&hit!==svgEl&&hit!==document.getElementById('bg-rect')){
      var isOurs=false;
      for(var j=0;j<elements.length;j++){
        if(elements[j].el===hit||elements[j].el.contains(hit)){ isOurs=true; break; }
      }
      if(isOurs){ hit.setAttribute('fill',fgCol); schedTex(); }
    }
    isDragging=false;

  } else if(currentTool==='eyedropper'){
    var hit2=document.elementFromPoint(e.clientX,e.clientY);
    if(hit2&&hit2!==svgEl&&hit2!==document.getElementById('bg-rect')){
      var f2=hit2.getAttribute('fill');
      if(f2&&f2!=='none'){
        fgCol=f2;
        fgPicker.value=f2;
        document.getElementById('fg-swatch').style.background=f2;
      }
    }
    isDragging=false;
  }
});

svgEl.addEventListener('mousemove',function(e){
  var p=svgPt(e);
  var sx=snap(p.x), sy=snap(p.y);

  if(currentTool==='pen'&&penDragging&&penAnchors.length>0){
    var last=penAnchors[penAnchors.length-1];
    penDragHandle.ox=sx-last.x;
    penDragHandle.oy=sy-last.y;
    updatePenPreview();
    return;
  }

  if(currentTool==='select'&&isDragging&&selectedEl){
    try{
      var bb=selectedEl.getBBox();
      var cx=bb.x+bb.width/2, cy=bb.y+bb.height/2;
      var dx=sx-dragOffset.x-cx, dy=sy-dragOffset.y-cy;
      var cur2=selectedEl.getAttribute('transform')||'';
      var m2=cur2.match(/translate\(([^,]+),([^,]+)\)/);
      var ox2=m2?parseFloat(m2[1]):0, oy2=m2?parseFloat(m2[2]):0;
      selectedEl.setAttribute('transform','translate('+(ox2+dx)+','+(oy2+dy)+')');
      showSel(selectedEl);
    }catch(ex){}
    return;
  }

  if(!isDragging||!currentEl) return;

  if(currentTool==='brush'){
    brushPath+=' L '+sx+' '+sy;
    currentEl.setAttribute('d',brushPath);

  } else if(currentTool==='rect'){
    var x0=Math.min(dragStart.x,sx), y0=Math.min(dragStart.y,sy);
    var w=Math.abs(sx-dragStart.x), h=Math.abs(sy-dragStart.y);
    currentEl.setAttribute('x',x0);currentEl.setAttribute('y',y0);
    currentEl.setAttribute('width',w);currentEl.setAttribute('height',h);

  } else if(currentTool==='circle'){
    var rx2=Math.abs(sx-dragStart.x), ry2=Math.abs(sy-dragStart.y);
    if(e.shiftKey) ry2=rx2;
    currentEl.setAttribute('rx',rx2);currentEl.setAttribute('ry',ry2);

  } else if(currentTool==='line'){
    currentEl.setAttribute('x2',sx);currentEl.setAttribute('y2',sy);
  }
});

svgEl.addEventListener('mouseup',function(e){
  if(currentTool==='pen'){
    penDragging=false;
    return;
  }

  if(!isDragging){ isDragging=false; return; }
  isDragging=false;

  if(currentTool==='brush'&&currentEl){
    addEl(currentEl,'brush');
    currentEl=null; brushPath='';

  } else if(currentTool==='rect'&&currentEl){
    var w2=parseFloat(currentEl.getAttribute('width')||0);
    var h2=parseFloat(currentEl.getAttribute('height')||0);
    if(w2>2&&h2>2){ addEl(currentEl,'rect'); }
    else if(currentEl.parentNode) currentEl.parentNode.removeChild(currentEl);
    currentEl=null;

  } else if(currentTool==='circle'&&currentEl){
    var rx3=parseFloat(currentEl.getAttribute('rx')||0);
    if(rx3>2){ addEl(currentEl,'circle'); }
    else if(currentEl.parentNode) currentEl.parentNode.removeChild(currentEl);
    currentEl=null;

  } else if(currentTool==='line'&&currentEl){
    var x1l=parseFloat(currentEl.getAttribute('x1')), y1l=parseFloat(currentEl.getAttribute('y1'));
    var x2l=parseFloat(currentEl.getAttribute('x2')), y2l=parseFloat(currentEl.getAttribute('y2'));
    if(Math.hypot(x2l-x1l,y2l-y1l)>2){ addEl(currentEl,'line'); }
    else if(currentEl.parentNode) currentEl.parentNode.removeChild(currentEl);
    currentEl=null;

  } else if(currentTool==='select'&&selectedEl){
    schedTex();

  } else if(currentTool==='text'){
    var svgR=svgEl.getBoundingClientRect();
    var ov=document.getElementById('text-overlay');
    var inp=document.getElementById('text-input');
    var pct_x=(e.clientX-svgR.left)/svgR.width*100;
    var pct_y=(e.clientY-svgR.top)/svgR.height*100;
    ov.style.left=pct_x+'%'; ov.style.top=pct_y+'%';
    ov.style.display='block';
    inp.value='';
    var textPos={x:svgPt(e).x, y:svgPt(e).y};
    // Assign directly — no accumulation
    inp.onkeydown=function(ev){
      ev.stopPropagation();
      if(ev.key==='Enter'){
        ev.preventDefault();
        var txt=inp.value.trim();
        if(txt){
          var fs=parseInt(document.getElementById('font-sz').value)||32;
          var fw=document.getElementById('font-style').value||'normal';
          var tel=document.createElementNS(NS,'text');
          tel.setAttribute('x', snap(textPos.x));
          tel.setAttribute('y', snap(textPos.y));
          tel.setAttribute('fill', fgCol);
          tel.setAttribute('font-size', fs);
          tel.setAttribute('font-family','system-ui,sans-serif');
          tel.setAttribute('font-weight', fw==='bold'?'bold':'normal');
          tel.setAttribute('font-style', fw==='italic'?'italic':'normal');
          tel.textContent=txt;
          addEl(tel,'text');
        }
        ov.style.display='none';
        inp.onkeydown=null;
      } else if(ev.key==='Escape'){
        ov.style.display='none';
        inp.onkeydown=null;
      }
    };
    setTimeout(function(){ inp.focus(); }, 0);
  }
});

svgEl.addEventListener('dblclick',function(e){
  if(currentTool==='pen') commitPen();
});

function getCleanSVG(){
  var skipIds=['pen-preview','sel-rect','sel-handles'];
  var children=Array.from(drawLayer.children).filter(function(c){
    return skipIds.indexOf(c.id)===-1;
  });
  var inner=children.map(function(c){ return c.outerHTML; }).join('\n');
  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">\n'+
    '<rect width="512" height="512" fill="#f0ede8"/>\n'+inner+'\n</svg>';
}

document.getElementById('btn-export-png').addEventListener('click',function(){

});

// ── WebGL2 Setup ──
var gl=glCanvas.getContext('webgl2');
var glTex=null, glProg=null;
var texCanvas=document.createElement('canvas');
texCanvas.width=512; texCanvas.height=512;
var texCtx=texCanvas.getContext('2d');

var VS=`#version 300 es
in vec2 aPos;
out vec2 vUV;
void main(){ vUV=aPos*.5+.5; gl_Position=vec4(aPos,0,1); }
`;

var FS=`#version 300 es
precision highp float;
in vec2 vUV;
out vec4 fragColor;
uniform sampler2D uTex;
uniform vec2 uRes;
uniform int uTileMode;
uniform int uTileCnt;
uniform int uRenderMode;
uniform vec3 uBg;
uniform vec3 uLightDir;
uniform float uLI;
uniform float uAmb;
uniform float uYarnSz;
uniform int uWeaveUnit;
uniform bool uGridOv;

vec2 tileUV(vec2 uv){
  float cnt=float(uTileCnt);
  vec2 t=uv*cnt;
  vec2 cell=floor(t);
  vec2 f=fract(t);
  if(uTileMode==1){
    if(mod(cell.y,2.0)>0.5) f.x=fract(f.x+0.5);
  } else if(uTileMode==2){
    if(mod(cell.x,2.0)>0.5) f.x=1.0-f.x;
    if(mod(cell.y,2.0)>0.5) f.y=1.0-f.y;
  } else if(uTileMode==3){
    int ci=int(mod(cell.x+cell.y*cnt,4.0));
    if(ci==1){ f=vec2(f.y,1.0-f.x); }
    else if(ci==2){ f=vec2(1.0-f.x,1.0-f.y); }
    else if(ci==3){ f=vec2(1.0-f.y,f.x); }
  } else if(uTileMode==4){
    vec2 hc=t/vec2(1.0,0.866);
    float ax=hc.x-floor(hc.x);
    float ay=hc.y-floor(hc.y);
    if(mod(floor(hc.x)+floor(hc.y),2.0)>0.5){
      f=vec2(ax,ay);
    } else {
      f=vec2(1.0-ax,1.0-ay);
    }
    f=clamp(f,0.0,1.0);
  }
  return f;
}

vec3 sobelNormal(vec2 uv, vec2 px){
  float tl=texture(uTex,uv+vec2(-px.x,-px.y)).a;
  float tc=texture(uTex,uv+vec2(0,-px.y)).a;
  float tr=texture(uTex,uv+vec2(px.x,-px.y)).a;
  float ml=texture(uTex,uv+vec2(-px.x,0)).a;
  float mr=texture(uTex,uv+vec2(px.x,0)).a;
  float bl=texture(uTex,uv+vec2(-px.x,px.y)).a;
  float bc=texture(uTex,uv+vec2(0,px.y)).a;
  float br=texture(uTex,uv+vec2(px.x,px.y)).a;
  float gx=(tr+2.0*mr+br)-(tl+2.0*ml+bl);
  float gy=(bl+2.0*bc+br)-(tl+2.0*tc+tr);
  return normalize(vec3(-gx,-gy,0.5));
}

void main(){
  vec2 px=1.0/uRes;
  vec2 tuv=tileUV(vUV);

  if(uRenderMode==3){
    // Weave mode
    vec2 pixCoord=vUV*uRes;
    float ys=uYarnSz;
    vec2 cellF=pixCoord/ys;
    vec2 cell=floor(cellF);
    vec2 within=fract(cellF);
    float col=cell.x;
    float row=cell.y;
    bool warpOver=mod(col+row,2.0)<1.0;

    vec2 warpCenter=(cell+0.5)*ys/uRes;
    vec2 weftCenter=(cell+0.5)*ys/uRes;
    vec4 warpTex=texture(uTex,tileUV(warpCenter));
    vec4 weftTex=texture(uTex,tileUV(weftCenter));
    // Use full tex color where there's content; neutral yarn color where bg
    vec3 yarnBase=uBg*0.92+vec3(0.04); // slightly darker neutral yarn
    vec3 warpCol=warpTex.a>0.05 ? warpTex.rgb : yarnBase;
    vec3 weftCol=weftTex.a>0.05 ? weftTex.rgb : yarnBase;

    // ellipse SDFs: warp=vertical, weft=horizontal
    vec2 w=within-0.5;
    float warpSDF, weftSDF;
    vec3 warpNorm, weftNorm;

    if(uWeaveUnit==1){
      // V shape: warp yarn bends into V (like chevron stitch)
      // warp: two diagonal tubes meeting at bottom
      float vy=abs(w.x)-abs(w.y)*0.7;
      warpSDF=length(vec2(vy*1.8,w.y*1.0))-0.38;
      weftSDF=length(vec2(w.x*1.0,w.y*2.2))-0.45;
      warpNorm=normalize(vec3(sign(w.x)*1.5,0,0.5));
      weftNorm=normalize(vec3(0,w.y*2.2,sqrt(max(0.0,0.2025-w.y*w.y*4.84))));
    } else if(uWeaveUnit==2){
      // X diagonal: yarns run at 45 degrees
      float d1=abs(w.x-w.y)*1.4;
      float d2=abs(w.x+w.y)*1.4;
      warpSDF=d1-0.38;
      weftSDF=d2-0.38;
      warpNorm=normalize(vec3(1,1,0.8));
      weftNorm=normalize(vec3(1,-1,0.8));
    } else if(uWeaveUnit==3){
      // Herringbone: alternating diagonal
      float dir=mod(col,2.0)<1.0?1.0:-1.0;
      float hd=abs(w.x-w.y*dir)*1.4;
      warpSDF=hd-0.38;
      weftSDF=length(vec2(w.x*2.4,w.y*1.0))-0.38;
      warpNorm=normalize(vec3(1,dir,0.7));
      weftNorm=normalize(vec3(w.x*2.4,0,0.5));
    } else {
      // Plain weave (default): warp=vertical ellipse, weft=horizontal ellipse
      warpSDF=length(vec2(w.x*2.2,w.y*1.0))-0.45;
      weftSDF=length(vec2(w.x*1.0,w.y*2.2))-0.45;
      warpNorm=normalize(vec3(w.x*2.2,0,sqrt(max(0.0,0.2025-w.x*w.x*4.84))));
      weftNorm=normalize(vec3(0,w.y*2.2,sqrt(max(0.0,0.2025-w.y*w.y*4.84))));
    }

    bool inWarp=warpSDF<0.0;
    bool inWeft=weftSDF<0.0;
    vec3 ld=normalize(uLightDir);
    vec3 viewDir=vec3(0.0,0.0,1.0);
    // Warp lighting + specular
    float warpDiff=max(0.0,dot(warpNorm,ld));
    vec3 warpRefl=reflect(-ld,warpNorm);
    float warpSpec=pow(max(0.0,dot(warpRefl,viewDir)),18.0)*0.35;
    vec3 warpLit=warpCol*(uAmb+uLI*warpDiff)+vec3(warpSpec);
    // Weft lighting + specular
    float weftDiff=max(0.0,dot(weftNorm,ld));
    vec3 weftRefl=reflect(-ld,weftNorm);
    float weftSpec=pow(max(0.0,dot(weftRefl,viewDir)),18.0)*0.35;
    vec3 weftLit=weftCol*(uAmb+uLI*weftDiff)+vec3(weftSpec);

    // shadow at crossing — stronger for more depth
    float crossDist=length(w)*6.0;
    float crossShadow=1.0-0.35*exp(-crossDist*crossDist);

    vec3 col3;
    if(warpOver){
      if(inWarp) col3=warpLit;
      else if(inWeft) col3=weftLit*crossShadow;
      else col3=uBg*0.97;
    } else {
      if(inWeft) col3=weftLit;
      else if(inWarp) col3=warpLit*crossShadow;
      else col3=uBg*0.97;
    }

    if(uGridOv){
      vec2 gf=fract(vUV*float(uTileCnt));
      if(gf.x<px.x*1.5||gf.y<px.y*1.5) col3=mix(col3,vec3(0.44,0.31,0.75),0.5);
    }
    fragColor=vec4(col3,1.0);

  } else {
    vec4 texColor=texture(uTex,tuv);
    vec3 base=mix(uBg,texColor.rgb,texColor.a);

    if(uRenderMode==0){
      // Flat
      if(uGridOv){
        vec2 gf=fract(vUV*float(uTileCnt));
        vec2 gpx=1.0/uRes;
        if(gf.x<gpx.x*1.5||gf.y<gpx.y*1.5) base=mix(base,vec3(0.44,0.31,0.75),0.6);
      }
      fragColor=vec4(base,1.0);

    } else if(uRenderMode==1){
      // Lace
      vec3 norm=sobelNormal(tuv,vec2(1.0/512.0));
      vec3 ld2=normalize(uLightDir);
      float diff=max(0.0,dot(norm,ld2));
      vec3 view=vec3(0,0,1);
      vec3 refl=reflect(-ld2,norm);
      float spec=pow(max(0.0,dot(refl,view)),32.0)*0.4;
      vec3 lit=base*(uAmb+uLI*diff)+vec3(spec);
      if(uGridOv){
        vec2 gf=fract(vUV*float(uTileCnt));vec2 gpx=1.0/uRes;
        if(gf.x<gpx.x*1.5||gf.y<gpx.y*1.5) lit=mix(lit,vec3(0.44,0.31,0.75),0.6);
      }
      fragColor=vec4(lit,1.0);

    } else {
      // Emboss
      vec3 norm2=sobelNormal(tuv,vec2(1.5/512.0));
      vec3 ld3=normalize(uLightDir);
      float diff2=max(0.0,dot(norm2,ld3));
      float emb=uAmb+uLI*1.5*diff2;
      vec3 lit2=base*emb;
      lit2=pow(clamp(lit2,0.0,1.0),vec3(0.7));
      if(uGridOv){
        vec2 gf=fract(vUV*float(uTileCnt));vec2 gpx=1.0/uRes;
        if(gf.x<gpx.x*1.5||gf.y<gpx.y*1.5) lit2=mix(lit2,vec3(0.44,0.31,0.75),0.6);
      }
      fragColor=vec4(lit2,1.0);
    }
  }
}
`;

function compileShader(type,src){
  var s=gl.createShader(type);
  gl.shaderSource(s,src);
  gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){
    console.error('Shader error:',gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

function initGL(){
  if(!gl){ console.error('WebGL2 not supported'); return; }
  var vs=compileShader(gl.VERTEX_SHADER,VS);
  var fs=compileShader(gl.FRAGMENT_SHADER,FS);
  if(!vs||!fs) return;
  glProg=gl.createProgram();
  gl.attachShader(glProg,vs); gl.attachShader(glProg,fs);
  gl.linkProgram(glProg);
  if(!gl.getProgramParameter(glProg,gl.LINK_STATUS)){
    console.error('Program link error:',gl.getProgramInfoLog(glProg));
    return;
  }
  var quad=new Float32Array([-1,-1,1,-1,-1,1,1,1]);
  var buf=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,quad,gl.STATIC_DRAW);
  var loc=gl.getAttribLocation(glProg,'aPos');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);

  glTex=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,glTex);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.REPEAT);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  var blk=new Uint8Array([14,14,24,255]);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,1,1,0,gl.RGBA,gl.UNSIGNED_BYTE,blk);
}

function uploadTex(){
  if(!gl||!glTex) return;
  gl.bindTexture(gl.TEXTURE_2D,glTex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,texCanvas);
}

function renderGL(){
  if(!gl||!glProg) return;
  gl.viewport(0,0,glCanvas.width,glCanvas.height);
  gl.useProgram(glProg);
  var u=function(n){ return gl.getUniformLocation(glProg,n); };
  gl.uniform1i(u('uTex'),0);
  gl.uniform2f(u('uRes'),glCanvas.width,glCanvas.height);
  gl.uniform1i(u('uTileMode'),tileMode);
  gl.uniform1i(u('uTileCnt'),tileCnt);
  gl.uniform1i(u('uRenderMode'),renderMode);
  gl.uniform3fv(u('uBg'),bgColor);
  var lx=(lightXY[0]-0.5)*2, ly=-(lightXY[1]-0.5)*2;
  var lz=lightH;
  var ll=Math.sqrt(lx*lx+ly*ly+lz*lz);
  gl.uniform3f(u('uLightDir'),lx/ll,ly/ll,lz/ll);
  gl.uniform1f(u('uLI'),lightI);
  gl.uniform1f(u('uAmb'),lightAmb);
  gl.uniform1f(u('uYarnSz'),yarnSz);
  gl.uniform1i(u('uWeaveUnit'),weaveUnit);
  gl.uniform1i(u('uGridOv'),gridOv?1:0);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}

// ── Texture pipeline ──
var texTimer=null;
function schedTex(){
  clearTimeout(texTimer);
  texTimer=setTimeout(rebuildTex,80);
}

function rebuildTex(){
  var skipIds=['pen-preview','sel-rect','sel-handles'];
  var children=Array.from(drawLayer.children).filter(function(c){
    return skipIds.indexOf(c.id)===-1;
  });
  var inner=children.map(function(c){ return c.outerHTML; }).join('\n');
  var svgStr='<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">'+
    '<rect width="512" height="512" fill="#f0ede8"/>'+inner+'</svg>';
  var blob=new Blob([svgStr],{type:'image/svg+xml'});
  var url=URL.createObjectURL(blob);
  var img=new Image();
  img.onload=function(){
    texCtx.clearRect(0,0,512,512);
    texCtx.drawImage(img,0,0,512,512);
    uploadTex();
    renderGL();
    URL.revokeObjectURL(url);
  };
  img.onerror=function(){ URL.revokeObjectURL(url); };
  img.src=url;
}

// ── ResizeObserver for GL canvas ──
new ResizeObserver(function(entries){
  var cr=entries[0].contentRect;
  var dpr=Math.min(devicePixelRatio,2);
  glCanvas.width=(cr.width*dpr)|0;
  glCanvas.height=(cr.height*dpr)|0;
  renderGL();
}).observe(glCanvas);

// ── Light globe ──
var globe=document.getElementById('light-globe');
var dot=document.getElementById('globe-dot');
function setGlobeDot(nx,ny){
  lightXY=[nx,ny];
  dot.style.left=(nx*60)+'px';
  dot.style.top=(ny*60)+'px';
  renderGL();
}
setGlobeDot(0.5,0.3);

var globeDragging=false;
globe.addEventListener('mousedown',function(e){
  globeDragging=true;
  var r=globe.getBoundingClientRect();
  setGlobeDot((e.clientX-r.left)/60,(e.clientY-r.top)/60);
  e.preventDefault();
});
document.addEventListener('mousemove',function(e){
  if(!globeDragging) return;
  var r=globe.getBoundingClientRect();
  var nx=Math.max(0,Math.min(1,(e.clientX-r.left)/60));
  var ny=Math.max(0,Math.min(1,(e.clientY-r.top)/60));
  setGlobeDot(nx,ny);
});
document.addEventListener('mouseup',function(){ globeDragging=false; });

document.getElementById('lh-sl').addEventListener('input',function(){
  lightH=parseInt(this.value)/100; renderGL();

  var b=parseInt(hex.slice(5,7),16)/255;
  bgColor=[r,g,b];
  document.getElementById('bg-rect').setAttribute('fill',hex);
  renderGL();
});
