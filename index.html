<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Stitch It</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#111118;color:#e8e0d0;font-family:system-ui,sans-serif;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

#topbar{
  height:42px;background:#0d0d18;border-bottom:1px solid #252535;
  display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;
}
.app-title{font-size:15px;font-weight:700;letter-spacing:0.08em;color:#c8b0f0;margin-right:6px;}
.sep{width:1px;height:18px;background:#252535;margin:0 2px;}
.act-btn{
  font-size:11px;padding:3px 9px;border-radius:4px;border:1px solid #333350;
  background:none;color:#9090b8;cursor:pointer;white-space:nowrap;
}
.act-btn:hover{border-color:#7060b0;color:#c8b0f0;}

#main{display:flex;flex:1;overflow:hidden;}

/* ── Left: unit cell editor ── */
#left{
  width:340px;flex-shrink:0;position:relative;
  background:#0e0e1c;border-right:1px solid #252535;
  display:flex;flex-direction:column;
}
#cell-label{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);
  font-size:10px;color:#5050808;letter-spacing:0.1em;text-transform:uppercase;
  color:#504868;pointer-events:none;z-index:5;white-space:nowrap;
}
#draw-canvas{display:block;cursor:crosshair;}

/* Tool bar */
#tool-bar{
  position:absolute;left:8px;top:36px;
  display:flex;flex-direction:column;gap:4px;z-index:10;
}
.tool-btn{
  width:30px;height:30px;border-radius:6px;border:1px solid #333350;
  background:#0d0d18;color:#7070a0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.tool-btn:hover{border-color:#7060b0;color:#c8b0f0;}
.tool-btn.active{border-color:#7060b0;color:#c8b0f0;background:#221840;}
.tool-btn svg{width:15px;height:15px;}

/* Bottom controls of left panel */
#left-ctrl{
  padding:8px 10px;border-top:1px solid #252535;display:flex;flex-direction:column;gap:6px;
  font-size:11px;color:#6060888;flex-shrink:0;
}
#left-ctrl label{display:flex;justify-content:space-between;align-items:center;color:#8080a8;}
#left-ctrl input[type=range]{width:110px;accent-color:#7060b0;}
#left-ctrl input[type=color]{width:80px;height:20px;border:none;background:none;cursor:pointer;}

/* ── Right: tiling preview ── */
#right{flex:1;position:relative;background:#0a0a14;display:flex;flex-direction:column;}

/* Tile mode bar */
#tile-bar{
  height:52px;background:#0d0d18;border-bottom:1px solid #252535;
  display:flex;align-items:center;padding:0 12px;gap:6px;flex-shrink:0;
}
#tile-bar span{font-size:10px;color:#504868;text-transform:uppercase;letter-spacing:0.1em;margin-right:4px;}
.tile-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:4px 8px;border-radius:6px;border:1px solid #333350;
  background:none;color:#7070a0;cursor:pointer;font-size:9px;letter-spacing:0.05em;
}
.tile-btn:hover{border-color:#7060b0;color:#c8b0f0;}
.tile-btn.active{border-color:#7060b0;color:#c8b0f0;background:#221840;}
.tile-btn svg{width:28px;height:20px;}

/* Preview area */
#preview-wrap{flex:1;position:relative;display:flex;align-items:center;justify-content:center;}
#preview-canvas{display:block;}

/* Cell grid overlay on preview */
#grid-overlay{position:absolute;pointer-events:none;top:0;left:0;}

/* Right side panels */
#right-panels{
  position:absolute;right:10px;top:10px;bottom:10px;
  display:flex;flex-direction:column;gap:8px;width:150px;
}
.rpanel{
  background:#0d0d18;border:1px solid #252535;border-radius:8px;
  padding:10px 11px;display:flex;flex-direction:column;gap:6px;
  font-size:11px;color:#6060888;
}
.rpanel-title{font-weight:600;color:#c8b0f0;font-size:11px;margin-bottom:2px;}
.rpanel label{display:flex;justify-content:space-between;align-items:center;color:#8080a8;}
.rpanel input[type=range]{width:72px;accent-color:#7060b0;}
.rpanel select{
  background:#111120;border:1px solid #333350;color:#9090b8;
  font-size:10px;border-radius:3px;padding:2px 4px;width:80px;
}

#light-globe{
  width:56px;height:56px;border-radius:50%;background:#1a1a2c;border:1px solid #333350;
  position:relative;cursor:crosshair;align-self:center;margin:2px 0;
}
#light-dot{
  width:9px;height:9px;border-radius:50%;background:#ffe080;
  position:absolute;transform:translate(-50%,-50%);
  box-shadow:0 0 6px #ffe08099;pointer-events:none;
}

/* Repeat count */
#rpt-btns{display:flex;gap:4px;flex-wrap:wrap;}
.rpt-btn{
  padding:2px 7px;border-radius:4px;border:1px solid #333350;
  background:none;color:#7070a0;cursor:pointer;font-size:10px;
}
.rpt-btn.active{border-color:#7060b0;color:#c8b0f0;background:#221840;}
</style>
</head>
<body>

<div id="topbar">
  <span class="app-title">Stitch It</span>
  <div class="sep"></div>
  <button class="act-btn" id="btn-undo">Undo</button>
  <button class="act-btn" id="btn-clear">Clear</button>
  <div class="sep"></div>
  <button class="act-btn" id="btn-export" style="border-color:#80c890;color:#80c890;">Export PNG</button>
</div>

<div id="main">

  <!-- LEFT: Unit Cell Editor -->
  <div id="left">
    <div id="cell-label">Unit Cell</div>
    <canvas id="draw-canvas"></canvas>
    <div id="tool-bar">
      <button class="tool-btn active" data-tool="brush" title="Brush (B)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 13 C5 10 10 5 13 3" stroke-linecap="round"/>
          <circle cx="3.5" cy="12.5" r="1.5" fill="currentColor" stroke="none"/>
        </svg>
      </button>
      <button class="tool-btn" data-tool="fill" title="Fill (F)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4">
          <path d="M3 11 L8 3 L13 11 Z" stroke-linejoin="round"/>
          <path d="M5.5 9 h5" stroke-linecap="round"/>
          <circle cx="13.5" cy="13" r="1.5" fill="currentColor" stroke="none"/>
        </svg>
      </button>
      <button class="tool-btn" data-tool="eraser" title="Eraser (E)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="2" y="7" width="8" height="5" rx="1.2"/>
          <path d="M10 12 L14 4" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div id="left-ctrl">
      <label>Thread width <input type="range" id="rng-w" min="2" max="24" value="7"></label>
      <label>Thread color <input type="color" id="clr-thread" value="#f0ece4"></label>
      <label>Bg color <input type="color" id="clr-bg" value="#08080f"></label>
    </div>
  </div>

  <!-- RIGHT: Tiling Preview -->
  <div id="right">
    <!-- Tiling mode selector bar -->
    <div id="tile-bar">
      <span>Pattern</span>

      <button class="tile-btn active" data-tile="repeat" title="Simple repeat">
        <svg viewBox="0 0 28 20"><rect x="1" y="1" width="11" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="15" y="1" width="11" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="1" y="11" width="11" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="15" y="11" width="11" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
        Repeat
      </button>

      <button class="tile-btn" data-tile="brick" title="Brick offset">
        <svg viewBox="0 0 28 20"><rect x="1" y="1" width="11" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="15" y="1" width="11" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="8" y="11" width="11" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="-4" y="11" width="10" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="21" y="11" width="10" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
        Brick
      </button>

      <button class="tile-btn" data-tile="mirror" title="Mirror both axes">
        <svg viewBox="0 0 28 20"><rect x="1" y="1" width="11" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="15" y="1" width="11" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.2" transform="scale(-1,1) translate(-28,0)"/><rect x="1" y="11" width="11" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.2" transform="scale(1,-1) translate(0,-20)"/><rect x="15" y="11" width="11" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.2" transform="scale(-1,-1) translate(-28,-20)"/><line x1="14" y1="1" x2="14" y2="19" stroke="currentColor" stroke-width="0.7" stroke-dasharray="2,1"/><line x1="1" y1="10" x2="27" y2="10" stroke="currentColor" stroke-width="0.7" stroke-dasharray="2,1"/></svg>
        Mirror
      </button>

      <button class="tile-btn" data-tile="rot90" title="Rotate 90° each tile">
        <svg viewBox="0 0 28 20"><rect x="1" y="1" width="11" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.2"/><rect x="15" y="1" width="11" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.2" transform="rotate(90 20.5 5)"/><rect x="1" y="11" width="11" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.2" transform="rotate(270 6.5 15)"/><rect x="15" y="11" width="11" height="8" rx="1" fill="none" stroke="currentColor" stroke-width="1.2" transform="rotate(180 20.5 15)"/></svg>
        Rot 90°
      </button>

      <button class="tile-btn" data-tile="hexpack" title="Hexagonal packing">
        <svg viewBox="0 0 28 20"><polygon points="7,2 11,2 13,5.5 11,9 7,9 5,5.5" fill="none" stroke="currentColor" stroke-width="1.2"/><polygon points="17,7 21,7 23,10.5 21,14 17,14 15,10.5" fill="none" stroke="currentColor" stroke-width="1.2"/><polygon points="1,12 5,12 7,15.5 5,19 1,19 -1,15.5" fill="none" stroke="currentColor" stroke-width="1.2"/><polygon points="22,1 26,1 28,4.5 26,8 22,8 20,4.5" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
        Hex
      </button>

      <div class="sep"></div>
      <span style="margin-left:2px;">Repeat</span>
      <div id="rpt-btns">
        <button class="rpt-btn" data-rpt="2">2×</button>
        <button class="rpt-btn active" data-rpt="3">3×</button>
        <button class="rpt-btn" data-rpt="4">4×</button>
        <button class="rpt-btn" data-rpt="5">5×</button>
      </div>
      <label id="show-grid-label" style="font-size:10px;color:#504868;display:flex;align-items:center;gap:4px;cursor:pointer;">
        <input type="checkbox" id="chk-grid" checked style="accent-color:#7060b0;"> Grid
      </label>
    </div>

    <div id="preview-wrap">
      <canvas id="preview-canvas"></canvas>
      <canvas id="grid-overlay"></canvas>
    </div>

    <!-- Right panels -->
    <div id="right-panels">
      <!-- Fabric -->
      <div class="rpanel">
        <div class="rpanel-title">Fabric</div>
        <label>Mesh
          <select id="sel-mesh">
            <option value="hex">Hexagonal</option>
            <option value="square">Square</option>
            <option value="dot">Dot</option>
            <option value="none">None</option>
          </select>
        </label>
        <label>Size <input type="range" id="rng-mesh-sz" min="3" max="22" value="8"></label>
        <label>Opacity <input type="range" id="rng-mesh-op" min="0" max="100" value="30"></label>
      </div>

      <!-- Light -->
      <div class="rpanel">
        <div class="rpanel-title">Light</div>
        <div id="light-globe"><div id="light-dot" style="left:68%;top:28%;"></div></div>
        <label>Height <input type="range" id="rng-lh" min="5" max="100" value="55"></label>
        <label>Intensity <input type="range" id="rng-li" min="0" max="250" value="130"></label>
        <label>Ambient <input type="range" id="rng-amb" min="0" max="100" value="28"></label>
      </div>
    </div>
  </div>
</div>

<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
const drawCanvas = document.getElementById('draw-canvas');
const dc = drawCanvas.getContext('2d');
let strokes = [];
let currentStroke = [];
let drawMode = 'brush';
let isDrawing = false;
let tileMode = 'repeat';
let repeatN = 3;
let lightX = 0.68, lightY = 0.28;

// ─── DRAW CANVAS SETUP ────────────────────────────────────────────────────────
function resizeDrawCanvas() {
  const left = document.getElementById('left');
  const ctrl = document.getElementById('left-ctrl');
  const r = left.getBoundingClientRect();
  const cr = ctrl.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio, 2);
  const cw = r.width, ch = r.height - cr.height;
  drawCanvas.width  = cw * dpr;
  drawCanvas.height = ch * dpr;
  drawCanvas.style.width  = cw + 'px';
  drawCanvas.style.height = ch + 'px';
  dc.scale(dpr, dpr);
  redrawAll();
}

function getPos(e) {
  const r = drawCanvas.getBoundingClientRect();
  const pr = e.pressure > 0 ? e.pressure : 0.5;
  const w = pr * parseFloat(document.getElementById('rng-w').value);
  return { x: e.clientX - r.left, y: e.clientY - r.top, w: Math.max(1, w) };
}

function drawStroke(s, alpha) {
  if (!s || s.pts.length < 2) return;
  const pts = s.pts;
  const col = document.getElementById('clr-thread').value;
  const baseW = parseFloat(document.getElementById('rng-w').value);
  dc.save();
  dc.lineCap = 'round'; dc.lineJoin = 'round';
  // Main thread
  dc.globalAlpha = alpha;
  dc.strokeStyle = col;
  for (let i = 1; i < pts.length; i++) {
    const p0 = pts[i-1], p1 = pts[i];
    const w = ((p0.w + p1.w) / 2) || baseW;
    dc.beginPath(); dc.lineWidth = w;
    dc.moveTo(p0.x, p0.y); dc.lineTo(p1.x, p1.y); dc.stroke();
  }
  // Sheen highlight
  dc.globalAlpha = alpha * 0.3;
  dc.strokeStyle = '#ffffff';
  for (let i = 1; i < pts.length; i++) {
    const p0 = pts[i-1], p1 = pts[i];
    const w = ((p0.w + p1.w) / 2) || baseW;
    dc.beginPath(); dc.lineWidth = Math.max(1, w * 0.28);
    dc.moveTo(p0.x, p0.y); dc.lineTo(p1.x, p1.y); dc.stroke();
  }
  dc.restore();
}

function redrawAll() {
  const r = drawCanvas.getBoundingClientRect();
  const cw = r.width, ch = r.height;
  dc.clearRect(0, 0, cw, ch);

  // Cell background
  const bgCol = document.getElementById('clr-bg').value;
  dc.fillStyle = bgCol;
  dc.fillRect(0, 0, cw, ch);

  // Grid guides (faint)
  dc.save();
  dc.strokeStyle = '#ffffff18';
  dc.lineWidth = 0.5;
  dc.setLineDash([3, 5]);
  const gd = Math.min(cw, ch) / 6;
  for (let x = gd; x < cw; x += gd) { dc.beginPath(); dc.moveTo(x, 0); dc.lineTo(x, ch); dc.stroke(); }
  for (let y = gd; y < ch; y += gd) { dc.beginPath(); dc.moveTo(0, y); dc.lineTo(cw, y); dc.stroke(); }
  dc.setLineDash([]);
  // Cell border
  dc.strokeStyle = '#7060b060';
  dc.lineWidth = 1.5;
  dc.strokeRect(1, 1, cw-2, ch-2);
  dc.restore();

  for (const s of strokes) drawStroke(s, 1.0);
  if (currentStroke.length > 1) drawStroke({ pts: currentStroke }, 0.7);

  schedulePreview();
}

// Fill tool: flood fill on a temporary canvas
function fillAt(pos) {
  const r = drawCanvas.getBoundingClientRect();
  const cw = r.width, ch = r.height;
  const dpr = Math.min(window.devicePixelRatio, 2);
  // Render current state to offscreen
  const off = document.createElement('canvas');
  off.width = drawCanvas.width; off.height = drawCanvas.height;
  const ctx = off.getContext('2d');
  ctx.drawImage(drawCanvas, 0, 0);
  const imgd = ctx.getImageData(0, 0, off.width, off.height);
  const px = pos.x * dpr | 0;
  const py = pos.y * dpr | 0;
  const col = document.getElementById('clr-thread').value;
  const fr = parseInt(col.slice(1,3),16);
  const fg = parseInt(col.slice(3,5),16);
  const fb = parseInt(col.slice(5,7),16);
  const idx = (py * off.width + px) * 4;
  const tr = imgd.data[idx], tg = imgd.data[idx+1], tb = imgd.data[idx+2], ta = imgd.data[idx+3];
  if (tr===fr && tg===fg && tb===fb) return;
  const stack = [[px, py]];
  const visited = new Set();
  const key = (x,y) => x + y * off.width;
  function match(i) {
    return Math.abs(imgd.data[i]-tr)<20 && Math.abs(imgd.data[i+1]-tg)<20 &&
           Math.abs(imgd.data[i+2]-tb)<20 && Math.abs(imgd.data[i+3]-ta)<20;
  }
  while (stack.length) {
    const [x,y] = stack.pop();
    if (x<0||x>=off.width||y<0||y>=off.height) continue;
    const k = key(x,y);
    if (visited.has(k)) continue;
    visited.add(k);
    const i = (y*off.width+x)*4;
    if (!match(i)) continue;
    imgd.data[i]=fr; imgd.data[i+1]=fg; imgd.data[i+2]=fb; imgd.data[i+3]=255;
    stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
  }
  ctx.putImageData(imgd, 0, 0);
  dc.drawImage(off, 0, 0, off.width, off.height, 0, 0, cw, ch);
  schedulePreview();
}

// ─── POINTER EVENTS ──────────────────────────────────────────────────────────
drawCanvas.addEventListener('pointerdown', e => {
  if (e.button !== 0) return;
  isDrawing = true;
  const p = getPos(e);
  if (drawMode === 'brush') { currentStroke = [p]; redrawAll(); }
  else if (drawMode === 'fill') { fillAt(p); }
  else if (drawMode === 'eraser') eraseAt(p);
});
drawCanvas.addEventListener('pointermove', e => {
  if (!isDrawing) return;
  const p = getPos(e);
  if (drawMode === 'brush') { currentStroke.push(p); redrawAll(); }
  else if (drawMode === 'eraser') eraseAt(p);
});
const commitStroke = () => {
  if (!isDrawing) return;
  isDrawing = false;
  if (drawMode === 'brush' && currentStroke.length > 1) {
    strokes.push({ pts: [...currentStroke] }); currentStroke = [];
    redrawAll(); saveDraft();
  }
};
drawCanvas.addEventListener('pointerup', commitStroke);
drawCanvas.addEventListener('pointerleave', commitStroke);

function eraseAt(p) {
  const r2 = 16*16;
  strokes = strokes.filter(s => !s.pts.some(q => (q.x-p.x)**2+(q.y-p.y)**2 < r2));
  redrawAll();
}

// ─── TOOLS + KEYS ────────────────────────────────────────────────────────────
document.querySelectorAll('.tool-btn').forEach(b => b.addEventListener('click', () => setTool(b.dataset.tool)));
function setTool(t) {
  drawMode = t;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.toggle('active', b.dataset.tool === t));
  drawCanvas.style.cursor = t === 'eraser' ? 'cell' : t === 'fill' ? 'crosshair' : 'crosshair';
}
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if ((e.ctrlKey||e.metaKey) && e.key==='z') { strokes.pop(); redrawAll(); saveDraft(); return; }
  const km = { b:'brush', f:'fill', e:'eraser' };
  if (km[e.key.toLowerCase()]) setTool(km[e.key.toLowerCase()]);
});
document.getElementById('btn-undo').addEventListener('click', () => { strokes.pop(); redrawAll(); saveDraft(); });
document.getElementById('btn-clear').addEventListener('click', () => {
  strokes = []; currentStroke = []; redrawAll(); localStorage.removeItem('stitchit_v1');
});

// ─── TILE MODE BUTTONS ───────────────────────────────────────────────────────
document.querySelectorAll('.tile-btn').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.tile-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  tileMode = b.dataset.tile;
  renderPreview(); updateGridOverlay();
}));

document.querySelectorAll('.rpt-btn').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.rpt-btn').forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  repeatN = parseInt(b.dataset.rpt);
  renderPreview(); updateGridOverlay();
}));

document.getElementById('chk-grid').addEventListener('change', updateGridOverlay);

// ─── WebGL PREVIEW ───────────────────────────────────────────────────────────
const previewCanvas = document.getElementById('preview-canvas');
const gl = previewCanvas.getContext('webgl2');

const VS = `#version 300 es
in vec2 aPos; out vec2 vUV;
void main(){ vUV=aPos*.5+.5; gl_Position=vec4(aPos,0,1); }`;

const FS = `#version 300 es
precision highp float;
in vec2 vUV; out vec4 fragColor;
uniform sampler2D uTex;
uniform vec2 uRes;
uniform float uMeshSz, uMeshOp;
uniform int uMeshType;
uniform vec3 uLightDir, uBg, uThread;
uniform float uLI, uAmb;

float hexDist(vec2 p){p=abs(p);return max(dot(p,normalize(vec2(1.,1.732))),p.x);}
float hexGrid(vec2 uv,float sz){
  vec2 r=vec2(1.,1.732),h=r*.5;
  return smoothstep(.42,.46,min(hexDist(mod(uv*sz,r)-h),hexDist(mod(uv*sz-h,r)-h)));
}
float sqGrid(vec2 uv,float sz){
  vec2 g=fract(uv*sz);
  return 1.-(1.-smoothstep(0.,.05,g.x)*smoothstep(1.,.95,g.x))*(1.-smoothstep(0.,.05,g.y)*smoothstep(1.,.95,g.y));
}
float dotGrid(vec2 uv,float sz){return 1.-smoothstep(.12,.22,length(fract(uv*sz*1.5)-.5));}

vec3 calcN(vec2 uv, vec2 px){
  float tl=texture(uTex,uv+px*vec2(-1,-1)).a, t=texture(uTex,uv+px*vec2(0,-1)).a,
        tr=texture(uTex,uv+px*vec2(1,-1)).a,  l=texture(uTex,uv+px*vec2(-1,0)).a,
        r=texture(uTex,uv+px*vec2(1,0)).a,   bl=texture(uTex,uv+px*vec2(-1,1)).a,
        b=texture(uTex,uv+px*vec2(0,1)).a,   br=texture(uTex,uv+px*vec2(1,1)).a;
  return normalize(vec3(-(tr+2.*r+br-tl-2.*l-bl)*5.,-(bl+2.*b+br-tl-2.*t-tr)*5.,1.));
}

void main(){
  vec2 px=1./uRes;
  float a=texture(uTex,vUV).a;
  float mesh=0.;
  if(uMeshType==0) mesh=hexGrid(vUV,uMeshSz);
  else if(uMeshType==1) mesh=sqGrid(vUV,uMeshSz);
  else if(uMeshType==2) mesh=dotGrid(vUV,uMeshSz);
  vec3 N=calcN(vUV,px*2.);
  vec3 L=normalize(uLightDir);
  float diff=max(dot(N,L),0.);
  float spec=pow(max(dot(reflect(-L,N),vec3(0,0,1)),0.),40.);
  float li=uAmb/100.+diff*(uLI/100.)+spec*(uLI/100.)*.5;
  vec3 meshCol=uBg+vec3(.10,.10,.13)*(uAmb/100.+diff*.2);
  vec3 col=uBg;
  col=mix(col,meshCol,mesh*uMeshOp/100.);
  col=mix(col,uThread*li,a);
  fragColor=vec4(col,1.);
}`;

function mkShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src); gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
  return s;
}
const prog = gl.createProgram();
gl.attachShader(prog, mkShader(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, mkShader(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog); gl.useProgram(prog);

const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
const aPos = gl.getAttribLocation(prog, 'aPos');
gl.enableVertexAttribArray(aPos);
gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

const uL = {};
['uTex','uRes','uMeshSz','uMeshOp','uMeshType','uLightDir','uBg','uThread','uLI','uAmb'].forEach(n => {
  uL[n] = gl.getUniformLocation(prog, n);
});

const tex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, tex);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.REPEAT);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.REPEAT);

function h2rgb(h){ return [parseInt(h.slice(1,3),16)/255, parseInt(h.slice(3,5),16)/255, parseInt(h.slice(5,7),16)/255]; }

// Build tiled canvas for texture
const tileC = document.createElement('canvas');
function buildTile(pw, ph) {
  tileC.width = pw; tileC.height = ph;
  const ctx = tileC.getContext('2d');
  ctx.clearRect(0, 0, pw, ph);
  const dpr = Math.min(window.devicePixelRatio, 2);
  const tw = pw / repeatN, th = ph / repeatN;

  for (let row = 0; row <= repeatN; row++) {
    for (let col = 0; col <= repeatN; col++) {
      let ox = col * tw, oy = row * th;
      let flipX = false, flipY = false;
      if (tileMode === 'mirror')  { flipX = col%2===1; flipY = row%2===1; }
      if (tileMode === 'brick')   { if (row%2===1) ox -= tw*0.5; }
      const rot = tileMode === 'rot90' ? (col + row*2) % 4 : 0;
      if (tileMode === 'hexpack') { if (row%2===1) ox += tw*0.5; oy = row * th * 0.866; }
      ctx.save();
      ctx.translate(ox + tw/2, oy + th/2);
      if (rot) ctx.rotate(rot * Math.PI/2);
      if (flipX || flipY) ctx.scale(flipX?-1:1, flipY?-1:1);
      ctx.drawImage(drawCanvas, 0, 0, drawCanvas.width, drawCanvas.height, -tw/2, -th/2, tw, th);
      ctx.restore();
    }
  }
  return tileC;
}

function resizePreview() {
  const wrap = document.getElementById('preview-wrap');
  const r = wrap.getBoundingClientRect();
  const size = Math.min(r.width - 170, r.height - 16) | 0;
  previewCanvas.width = size; previewCanvas.height = size;
  previewCanvas.style.width = size+'px'; previewCanvas.style.height = size+'px';
  const ov = document.getElementById('grid-overlay');
  ov.width = size; ov.height = size;
  ov.style.width = size+'px'; ov.style.height = size+'px';
  requestAnimationFrame(() => {
    const pr = previewCanvas.getBoundingClientRect();
    const wr = wrap.getBoundingClientRect();
    ov.style.left = (pr.left - wr.left) + 'px';
    ov.style.top  = (pr.top  - wr.top)  + 'px';
  });
  gl.viewport(0, 0, size, size);
  renderPreview(); updateGridOverlay();
}

let _raf = null;
function schedulePreview() {
  if (_raf) return;
  _raf = requestAnimationFrame(() => { _raf = null; renderPreview(); updateGridOverlay(); });
}

function renderPreview() {
  const pw = previewCanvas.width, ph = previewCanvas.height;
  gl.bindTexture(gl.TEXTURE_2D, tex);
  gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, buildTile(pw, ph));
  gl.uniform1i(uL.uTex, 0);
  gl.uniform2f(uL.uRes, pw, ph);
  gl.uniform1f(uL.uMeshSz, parseFloat(document.getElementById('rng-mesh-sz').value));
  gl.uniform1f(uL.uMeshOp, parseFloat(document.getElementById('rng-mesh-op').value));
  const mt={hex:0,square:1,dot:2,none:3};
  gl.uniform1i(uL.uMeshType, mt[document.getElementById('sel-mesh').value]??0);
  const lx=(lightX-.5)*2, ly=-(lightY-.5)*2, lz=parseFloat(document.getElementById('rng-lh').value)/100;
  const ll=Math.sqrt(lx*lx+ly*ly+lz*lz)||1;
  gl.uniform3f(uL.uLightDir, lx/ll, ly/ll, lz/ll);
  gl.uniform1f(uL.uLI, parseFloat(document.getElementById('rng-li').value));
  gl.uniform1f(uL.uAmb, parseFloat(document.getElementById('rng-amb').value));
  const bg=h2rgb(document.getElementById('clr-bg').value);
  const th=h2rgb(document.getElementById('clr-thread').value);
  gl.uniform3f(uL.uBg, bg[0],bg[1],bg[2]);
  gl.uniform3f(uL.uThread, th[0],th[1],th[2]);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

function updateGridOverlay() {
  const ov = document.getElementById('grid-overlay');
  const ctx = ov.getContext('2d');
  ctx.clearRect(0, 0, ov.width, ov.height);
  if (!document.getElementById('chk-grid').checked) return;
  const pw = ov.width, ph = ov.height;
  const tw = pw/repeatN, th = ph/repeatN;
  ctx.strokeStyle = '#7060b066';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  if (tileMode === 'hexpack') {
    const hexH = th * 0.866;
    for (let row = 0; row <= repeatN+1; row++) {
      ctx.beginPath(); ctx.moveTo(0, row*hexH); ctx.lineTo(pw, row*hexH); ctx.stroke();
    }
    for (let col = 0; col <= repeatN; col++) {
      ctx.beginPath(); ctx.moveTo(col*tw, 0); ctx.lineTo(col*tw, ph); ctx.stroke();
    }
  } else {
    for (let i = 0; i <= repeatN; i++) {
      ctx.beginPath(); ctx.moveTo(i*tw,0); ctx.lineTo(i*tw,ph); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,i*th); ctx.lineTo(pw,i*th); ctx.stroke();
    }
  }
}

// ─── LIGHT GLOBE ─────────────────────────────────────────────────────────────
const globe = document.getElementById('light-globe');
const dot   = document.getElementById('light-dot');
globe.addEventListener('pointerdown', e => { globe.setPointerCapture(e.pointerId); moveLt(e); });
globe.addEventListener('pointermove', e => { if(e.buttons!==1) return; moveLt(e); });
function moveLt(e) {
  const r = globe.getBoundingClientRect();
  lightX = Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
  lightY = Math.max(0,Math.min(1,(e.clientY-r.top)/r.height));
  dot.style.left=(lightX*100)+'%'; dot.style.top=(lightY*100)+'%';
  renderPreview();
}

// ─── CONTROLS ────────────────────────────────────────────────────────────────
['sel-mesh','rng-mesh-sz','rng-mesh-op','rng-lh','rng-li','rng-amb','clr-thread','clr-bg','rng-w'].forEach(id => {
  document.getElementById(id).addEventListener('input', () => redrawAll());
});
document.getElementById('chk-grid').addEventListener('change', updateGridOverlay);

// ─── EXPORT ──────────────────────────────────────────────────────────────────
document.getElementById('btn-export').addEventListener('click', () => {
  renderPreview();
  previewCanvas.toBlob(blob => {
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = 'stitchit.png'; a.click();
  });
});

// ─── LOCALSTORAGE ────────────────────────────────────────────────────────────
const LS_KEY = 'stitchit_v1';
function saveDraft() { try { localStorage.setItem(LS_KEY, JSON.stringify(strokes)); } catch(e) {} }
function loadDraft() {
  try { const d=localStorage.getItem(LS_KEY); if(d){ strokes=JSON.parse(d); redrawAll(); } } catch(e) {}
}

// ─── RESIZE + INIT ───────────────────────────────────────────────────────────
function onResize() { resizeDrawCanvas(); resizePreview(); }
window.addEventListener('resize', onResize);
requestAnimationFrame(() => { onResize(); loadDraft(); });
</script>
