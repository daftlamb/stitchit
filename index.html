<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stitch It</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0e0e18;--hdr:#090912;--bdr:#252535;--acc:#8060d0;
  --pl:#111120;--pr:#0a0a14;--txt:#ccc;--txt2:#888;
  --btn:#1a1a2e;--bth:#252540;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--txt);font-family:system-ui,sans-serif;font-size:12px}
#topbar{display:flex;align-items:center;gap:6px;padding:0 10px;height:38px;background:var(--hdr);border-bottom:1px solid var(--bdr);flex-shrink:0;user-select:none}
.logo{font-size:14px;font-weight:700;color:var(--acc);margin-right:6px;letter-spacing:.5px}
.sep{width:1px;height:20px;background:var(--bdr);margin:0 2px}
#topbar label,#topbar span{color:var(--txt2);font-size:11px}
#topbar select{background:var(--btn);color:var(--txt);border:1px solid var(--bdr);border-radius:4px;padding:2px 4px;font-size:11px}
#topbar input[type=checkbox]{accent-color:var(--acc)}
.tbtn{background:var(--btn);color:var(--txt);border:1px solid var(--bdr);border-radius:4px;padding:3px 8px;font-size:11px;cursor:pointer;white-space:nowrap}
.tbtn:hover{background:var(--bth)}
.tbtn.acc{background:var(--acc);border-color:var(--acc);color:#fff}
#main{display:flex;height:calc(100vh - 38px)}
#left-panel{width:420px;min-width:280px;flex-shrink:0;background:var(--pl);border-right:1px solid var(--bdr);display:flex;flex-direction:column;position:relative}
#svg-wrap{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:var(--pl);}
#svg-canvas{display:block;max-width:100%;max-height:100%;aspect-ratio:1/1;}
#tool-bar{position:absolute;left:8px;top:50%;transform:translateY(-50%);display:flex;flex-direction:column;gap:4px;background:#13132288;backdrop-filter:blur(6px);border:1px solid var(--bdr);border-radius:8px;padding:6px 4px;z-index:10}
.tool-btn{width:30px;height:30px;border-radius:5px;border:1px solid transparent;background:transparent;color:var(--txt);cursor:pointer;font-size:13px;display:flex;align-items:center;justify-content:center;transition:background .1s}
.tool-btn:hover{background:var(--bth)}
.tool-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
#color-bar{height:52px;border-top:1px solid var(--bdr);display:flex;align-items:center;gap:10px;padding:0 14px;flex-shrink:0}
.swatch{width:24px;height:24px;border-radius:4px;border:2px solid #444;cursor:pointer;flex-shrink:0}
.swatch:hover{border-color:var(--acc)}
#stroke-slider{width:80px;accent-color:var(--acc)}
#fill-toggle{accent-color:var(--acc)}
#right-panel{flex:1;background:var(--pr);display:flex;flex-direction:column;overflow:hidden}
#tiling-bar{height:44px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:5px;padding:0 10px;flex-shrink:0;overflow-x:auto}
.tile-btn{height:28px;padding:0 8px;border-radius:5px;border:1px solid var(--bdr);background:var(--btn);color:var(--txt);cursor:pointer;font-size:11px;white-space:nowrap}
.tile-btn:hover{background:var(--bth)}
.tile-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
.cnt-btn{width:28px;height:24px;border-radius:4px;border:1px solid var(--bdr);background:var(--btn);color:var(--txt);cursor:pointer;font-size:10px}
.cnt-btn:hover{background:var(--bth)}
.cnt-btn.active{background:var(--acc);border-color:var(--acc);color:#fff}
#preview-wrap{flex:1;position:relative;overflow:hidden;display:flex;align-items:stretch;}
#gl-canvas{display:block;flex:1;min-width:0;}
#right-controls{position:absolute;right:0;top:0;bottom:0;width:176px;background:#0a0a14dd;backdrop-filter:blur(4px);border-left:1px solid var(--bdr);overflow-y:auto;padding:8px}
.cs{margin-bottom:10px}
.ct{font-size:10px;font-weight:600;color:var(--acc);text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.cr{display:flex;align-items:center;gap:5px;margin-bottom:4px}
.cr label{color:var(--txt2);font-size:10px;min-width:46px}
.cr input[type=range]{flex:1;accent-color:var(--acc)}
.cr input[type=color]{width:28px;height:20px;border:none;background:none;cursor:pointer;padding:0}
.mbtn{width:100%;height:24px;border-radius:4px;border:1px solid var(--bdr);background:var(--btn);color:var(--txt);cursor:pointer;font-size:10px;margin-bottom:3px;text-align:left;padding:0 8px}
.mbtn:hover{background:var(--bth)}
.mbtn.active{background:var(--acc);border-color:var(--acc);color:#fff}
.mshbtn{flex:1;height:22px;border-radius:3px;border:1px solid var(--bdr);background:var(--btn);color:var(--txt);cursor:pointer;font-size:9px}
.mshbtn.active{background:var(--acc);border-color:var(--acc);color:#fff}
#globe-wrap{position:relative;width:80px;height:80px;margin:4px auto}
#globe-bg{width:80px;height:80px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#2a2a40,#0a0a14);border:1px solid var(--bdr)}
#light-dot{position:absolute;width:12px;height:12px;border-radius:50%;background:var(--acc);box-shadow:0 0 6px var(--acc);cursor:grab;transform:translate(-50%,-50%);left:50%;top:30%}
</style>
</head>
<body>
<div id="topbar">
  <span class="logo">✦ Stitch It</span>
  <div class="sep"></div>
  <label>Grid:<select id="grid-sel"><option value="8">8</option><option value="12">12</option><option value="16" selected>16</option><option value="24">24</option><option value="32">32</option></select></label>
  <label style="display:flex;align-items:center;gap:3px"><input type="checkbox" id="snap-cb" checked>Snap</label>
  <div class="sep"></div>
  <button class="tbtn" id="upload-btn">⬆ Upload SVG</button>
  <input type="file" id="file-input" accept=".svg" style="display:none">
  <div class="sep"></div>
  <button class="tbtn" id="undo-btn">↩ Undo</button>
  <button class="tbtn" id="clear-btn">✕ Clear</button>
  <div class="sep"></div>
  <button class="tbtn acc" id="export-png-btn">⬇ PNG</button>
  <button class="tbtn" id="export-svg-btn">⬇ SVG</button>
</div>
<div id="main">
  <div id="left-panel">
    <div id="svg-wrap">
      <svg id="svg-canvas" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
        <g id="grid-layer" style="pointer-events:none"></g>
        <g id="drawing-layer">
          <path id="pen-preview" fill="none" stroke="#8060d0" stroke-width="1.5" stroke-dasharray="5,3" style="pointer-events:none"/>
          <rect id="sel-rect" fill="none" stroke="#8060d0" stroke-width="1.5" stroke-dasharray="4,3" style="pointer-events:none;display:none"/>
          <g id="sel-handles" style="pointer-events:none"></g>
        </g>
      </svg>
      <div id="tool-bar">
        <button class="tool-btn active" data-tool="select" title="Select (V)">⊹</button>
        <button class="tool-btn" data-tool="pen" title="Pen (P)">✒</button>
        <button class="tool-btn" data-tool="rect" title="Rect (R)">▭</button>
        <button class="tool-btn" data-tool="circle" title="Circle (C)">◯</button>
        <button class="tool-btn" data-tool="line" title="Line (L)">╱</button>
        <button class="tool-btn" data-tool="brush" title="Brush (B)">🖌</button>
        <button class="tool-btn" data-tool="fill" title="Fill (F)">🪣</button>
        <button class="tool-btn" data-tool="eyedropper" title="Eyedropper (I)">💧</button>
      </div>
    </div>
    <div id="color-bar">
      <div style="position:relative;width:34px;height:34px;flex-shrink:0">
        <div class="swatch" id="fg-swatch" style="position:absolute;left:0;top:0;z-index:2"></div>
        <div class="swatch" id="bg-swatch" style="position:absolute;left:10px;top:10px;z-index:1"></div>
      </div>
      <input type="color" id="fg-input" style="position:absolute;opacity:0;width:0;height:0">
      <input type="color" id="bg-input" style="position:absolute;opacity:0;width:0;height:0">
      <label style="margin-left:8px;display:flex;align-items:center;gap:4px;color:var(--txt2)">W:<input type="range" id="stroke-slider" min="1" max="20" value="3"></label>
      <span id="stroke-val" style="color:var(--txt2)">3</span>
      <label style="display:flex;align-items:center;gap:4px"><input type="checkbox" id="fill-toggle" checked>Fill</label>
    </div>
  </div>
  <div id="right-panel">
    <div id="tiling-bar">
      <button class="tile-btn active" data-tm="repeat">⬛ Repeat</button>
      <button class="tile-btn" data-tm="brick">🧱 Brick</button>
      <button class="tile-btn" data-tm="mirror">⧉ Mirror</button>
      <button class="tile-btn" data-tm="rot90">↻ Rot90</button>
      <button class="tile-btn" data-tm="hex">⬡ Hex</button>
      <div class="sep"></div>
      <button class="cnt-btn active" data-cnt="2">2×</button>
      <button class="cnt-btn" data-cnt="3">3×</button>
      <button class="cnt-btn" data-cnt="4">4×</button>
      <button class="cnt-btn" data-cnt="5">5×</button>
      <div class="sep"></div>
      <label style="display:flex;align-items:center;gap:3px;color:var(--txt2);font-size:10px"><input type="checkbox" id="grid-ov-cb">Grid</label>
    </div>
    <div id="preview-wrap">
      <canvas id="gl-canvas"></canvas>
      <div id="right-controls">
        <div class="cs"><div class="ct">Render</div>
          <button class="mbtn active" data-rm="0">Flat</button>
          <button class="mbtn" data-rm="1">Lace</button>
          <button class="mbtn" data-rm="2">Emboss</button>
          <button class="mbtn" data-rm="3">Shadow</button>
        </div>
        <div class="cs"><div class="ct">Fabric</div>
          <div class="cr" style="gap:2px">
            <button class="mshbtn active" data-mesh="0">Hex</button>
            <button class="mshbtn" data-mesh="1">Sq</button>
            <button class="mshbtn" data-mesh="2">Dot</button>
            <button class="mshbtn" data-mesh="3">None</button>
          </div>
          <div class="cr"><label>Size</label><input type="range" id="mesh-sz" min="4" max="60" value="16"></div>
          <div class="cr"><label>Opacity</label><input type="range" id="mesh-op" min="0" max="100" value="40"></div>
        </div>
        <div class="cs"><div class="ct">Light</div>
          <div id="globe-wrap"><div id="globe-bg"></div><div id="light-dot"></div></div>
          <div class="cr"><label>Height</label><input type="range" id="light-h" min="1" max="100" value="60"></div>
          <div class="cr"><label>Intensity</label><input type="range" id="light-i" min="0" max="200" value="80"></div>
          <div class="cr"><label>Ambient</label><input type="range" id="light-a" min="0" max="100" value="30"></div>
        </div>
        <div class="cs"><div class="ct">Colors</div>
          <div class="cr"><label>Thread</label><input type="color" id="thread-col" value="#8060d0"></div>
          <div class="cr"><label>Bg</label><input type="color" id="bg-col" value="#0e0e18"></div>
          <div class="cr"><label>Shadow</label><input type="color" id="shadow-col" value="#000000"></div>
        </div>
      </div>
    </div>
  </div>
</div>
<script>
(function(){
"use strict";
// SVG namespace
var NS="http://www.w3.org/2000/svg";
var TEX=512;

// ── state ──
var tool="select";
var fgCol="#8060d0", bgCol="#ffffff";
var sw=3, useFill=true, snap=true, gridSz=16;
var elements=[];
var selectedEl=null;
// shape drag
var shapeStart=null, shapeEl=null, shapeTmp=null;
// select drag
var selDrag=false, selDragStart=null, selDragBB=null;
// pen
var penPts=[], penDown=false, penDownPt=null;
// brush
var brushEl=null, brushPts=[];
// tiling
var tilingMode="repeat", tilingCnt=2, renderMode=0;
var meshType=0, meshSz=16, meshOp=0.4, gridOv=false;
var lightX=0.3, lightY=-0.5, lightH=0.8, lightI=0.8, lightA=0.3;
var shadowCol=[0,0,0];
var texDirty=false, texTimer=null;

// ── dom refs ──
var svgEl=document.getElementById("svg-canvas");
var gridLayer=document.getElementById("grid-layer");
var drawLayer=document.getElementById("drawing-layer");
var penPrev=document.getElementById("pen-preview");
var selRect=document.getElementById("sel-rect");
var selHandles=document.getElementById("sel-handles");
var glCanvas=document.getElementById("gl-canvas");
var fgSwatch=document.getElementById("fg-swatch");
var bgSwatch=document.getElementById("bg-swatch");
var fgInput=document.getElementById("fg-input");
var bgInput=document.getElementById("bg-input");
var strokeSlider=document.getElementById("stroke-slider");
var strokeValEl=document.getElementById("stroke-val");
var fillToggle=document.getElementById("fill-toggle");
var snapCb=document.getElementById("snap-cb");
var gridSel=document.getElementById("grid-sel");
var previewWrap=document.getElementById("preview-wrap");
var globeWrap=document.getElementById("globe-wrap");
var lightDot=document.getElementById("light-dot");

// ── grid ──
function buildGrid(){
  while(gridLayer.firstChild) gridLayer.removeChild(gridLayer.firstChild);
  var step=512/gridSz;
  for(var i=0;i<=gridSz;i++){
    var v=step*i;
    var lh=document.createElementNS(NS,"line");
    lh.setAttribute("x1","0"); lh.setAttribute("y1",""+v);
    lh.setAttribute("x2","512"); lh.setAttribute("y2",""+v);
    lh.setAttribute("stroke","#ffffff15"); lh.setAttribute("stroke-width","0.5");
    gridLayer.appendChild(lh);
    var lv=document.createElementNS(NS,"line");
    lv.setAttribute("x1",""+v); lv.setAttribute("y1","0");
    lv.setAttribute("x2",""+v); lv.setAttribute("y2","512");
    lv.setAttribute("stroke","#ffffff15"); lv.setAttribute("stroke-width","0.5");
    gridLayer.appendChild(lv);
  }
}
buildGrid();
gridSel.addEventListener("change",function(){ gridSz=parseInt(this.value); buildGrid(); schedTex(); });
snapCb.addEventListener("change",function(){ snap=this.checked; });

// ── snap ──
function snapV(v){ if(!snap) return v; var s=512/gridSz; return Math.round(v/s)*s; }
function snapP(p){ return {x:snapV(p.x), y:snapV(p.y)}; }

// ── svg coord ──
function svgPt(e){
  var r=svgEl.getBoundingClientRect();
  // Map screen pixels → SVG viewBox (0 0 512 512)
  var x=(e.clientX-r.left)/r.width*512;
  var y=(e.clientY-r.top)/r.height*512;
  return {x:x, y:y};
}

// ── tools ──
document.querySelectorAll(".tool-btn").forEach(function(b){
  b.addEventListener("click",function(){
    tool=this.dataset.tool;
    document.querySelectorAll(".tool-btn").forEach(function(x){ x.classList.remove("active"); });
    this.classList.add("active");
    clearSel(); cancelPen();
  });
});

document.addEventListener("keydown",function(e){
  if(e.target.tagName==="INPUT"||e.target.tagName==="SELECT") return;
  var map={v:"select",p:"pen",r:"rect",c:"circle",l:"line",b:"brush",f:"fill",i:"eyedropper"};
  var k=e.key.toLowerCase();
  if(map[k]){
    tool=map[k];
    document.querySelectorAll(".tool-btn").forEach(function(x){ x.classList.remove("active"); });
    var tb=document.querySelector('[data-tool="'+tool+'"]');
    if(tb) tb.classList.add("active");
    clearSel(); cancelPen();
  }
  if((e.key==="Delete"||e.key==="Backspace")&&selectedEl){ removeEl(selectedEl); clearSel(); }
  if((e.key==="z")&&(e.ctrlKey||e.metaKey)){ e.preventDefault(); undoLast(); }
  if(e.key==="Enter"&&tool==="pen") commitPen();
  if(e.key==="Escape"){ cancelPen(); clearSel(); }
});

// ── colors ──
function updSwatches(){ fgSwatch.style.background=fgCol; bgSwatch.style.background=bgCol; }
updSwatches();
fgSwatch.addEventListener("click",function(){ fgInput.value=fgCol; fgInput.click(); });
bgSwatch.addEventListener("click",function(){ bgInput.value=bgCol; bgInput.click(); });
fgInput.addEventListener("input",function(){ fgCol=this.value; updSwatches(); });
bgInput.addEventListener("input",function(){ bgCol=this.value; updSwatches(); });
strokeSlider.addEventListener("input",function(){ sw=parseInt(this.value); strokeValEl.textContent=sw; if(selectedEl){ selectedEl.setAttribute("stroke-width",sw); schedTex(); } });
fillToggle.addEventListener("change",function(){ useFill=this.checked; });

// ── elements ──
function addEl(el,type){
  drawLayer.insertBefore(el, penPrev);
  elements.push({el:el,type:type});
  schedTex();
}
function removeEl(el){
  if(el.parentNode) el.parentNode.removeChild(el);
  elements=elements.filter(function(e){ return e.el!==el; });
  schedTex();
}
function undoLast(){
  if(!elements.length) return;
  var last=elements[elements.length-1];
  if(last.el.parentNode) last.el.parentNode.removeChild(last.el);
  elements.pop(); clearSel(); schedTex();
}
document.getElementById("undo-btn").addEventListener("click",undoLast);
document.getElementById("clear-btn").addEventListener("click",function(){
  var toRemove=elements.map(function(e){ return e.el; });
  toRemove.forEach(function(el){ if(el.parentNode) el.parentNode.removeChild(el); });
  elements=[]; clearSel(); cancelPen(); schedTex();
});

// ── selection ──
function clearSel(){
  selectedEl=null;
  selRect.setAttribute("display","none");
  while(selHandles.firstChild) selHandles.removeChild(selHandles.firstChild);
}
function selectEl(el){
  selectedEl=el;
  updSelBox();
}
function updSelBox(){
  if(!selectedEl) return;
  try{
    var bb=selectedEl.getBBox();
    var p=4;
    selRect.setAttribute("x",bb.x-p); selRect.setAttribute("y",bb.y-p);
    selRect.setAttribute("width",bb.width+p*2); selRect.setAttribute("height",bb.height+p*2);
    selRect.setAttribute("display","inline");
    while(selHandles.firstChild) selHandles.removeChild(selHandles.firstChild);
    var pts=[
      {x:bb.x-p,y:bb.y-p},{x:bb.x+bb.width/2,y:bb.y-p},{x:bb.x+bb.width+p,y:bb.y-p},
      {x:bb.x+bb.width+p,y:bb.y+bb.height/2},{x:bb.x+bb.width+p,y:bb.y+bb.height+p},
      {x:bb.x+bb.width/2,y:bb.y+bb.height+p},{x:bb.x-p,y:bb.y+bb.height+p},
      {x:bb.x-p,y:bb.y+bb.height/2}
    ];
    pts.forEach(function(pt){
      var h=document.createElementNS(NS,"rect");
      h.setAttribute("x",pt.x-3); h.setAttribute("y",pt.y-3);
      h.setAttribute("width",6); h.setAttribute("height",6);
      h.setAttribute("fill","#8060d0"); h.setAttribute("stroke","#fff");
      h.setAttribute("stroke-width","1");
      selHandles.appendChild(h);
    });
  }catch(err){}
}

// ── hit test ──
function elAtPt(pt){
  for(var i=elements.length-1;i>=0;i--){
    var el=elements[i].el;
    try{
      var bb=el.getBBox();
      if(pt.x>=bb.x-6&&pt.x<=bb.x+bb.width+6&&pt.y>=bb.y-6&&pt.y<=bb.y+bb.height+6) return el;
    }catch(e){}
  }
  return null;
}

// ── apply style ──
function applyStyle(el,isBrush){
  el.setAttribute("stroke",bgCol);
  el.setAttribute("stroke-width",sw);
  if(isBrush){
    el.setAttribute("fill","none");
  } else {
    el.setAttribute("fill", useFill ? fgCol : "none");
  }
}

// ── pen ──
function cancelPen(){
  penPts=[]; penDown=false; penDownPt=null;
  penPrev.setAttribute("d","");
}
function commitPen(){
  if(penPts.length<2){ cancelPen(); return; }
  var d=penPtsToD(penPts);
  var p=document.createElementNS(NS,"path");
  p.setAttribute("d",d);
  applyStyle(p,false);
  addEl(p,"path");
  cancelPen();
}
function penPtsToD(pts){
  var d="M "+pts[0].x+","+pts[0].y;
  for(var i=1;i<pts.length;i++){
    var prev=pts[i-1];
    var cur=pts[i];
    d+=" C "+prev.cpx2+","+prev.cpy2+" "+cur.cpx+","+cur.cpy+" "+cur.x+","+cur.y;
  }
  return d;
}
function updPenPreview(curPt){
  if(penPts.length===0) return;
  var pts=penPts.concat([{x:curPt.x,y:curPt.y,cpx:curPt.x,cpy:curPt.y,cpx2:curPt.x,cpy2:curPt.y}]);
  penPrev.setAttribute("d",penPtsToD(pts));
}

// ── SVG events ──
svgEl.addEventListener("mousedown",onDown);
window.addEventListener("mousemove",onMove);
window.addEventListener("mouseup",onUp);
svgEl.addEventListener("dblclick",onDbl);

function onDown(e){
  if(e.button!==0) return;
  var pt=svgPt(e), spt=snapP(pt);

  if(tool==="select"){
    var hit=elAtPt(pt);
    if(hit){ selectEl(hit); selDrag=true; selDragStart=pt; try{ selDragBB=hit.getBBox(); }catch(er){ selDragBB={x:0,y:0}; } }
    else clearSel();
    return;
  }

  if(tool==="pen"){
    penDown=true; penDownPt=spt;
    if(penPts.length===0){ penPts.push({x:spt.x,y:spt.y,cpx:spt.x,cpy:spt.y,cpx2:spt.x,cpy2:spt.y}); }
    return;
  }

  if(tool==="brush"){
    brushPts=[pt];
    brushEl=document.createElementNS(NS,"path");
    brushEl.setAttribute("d","M "+pt.x+","+pt.y);
    brushEl.setAttribute("fill","none");
    brushEl.setAttribute("stroke",fgCol);
    brushEl.setAttribute("stroke-width",sw);
    brushEl.setAttribute("stroke-linecap","round");
    brushEl.setAttribute("stroke-linejoin","round");
    drawLayer.insertBefore(brushEl, penPrev);
    return;
  }

  if(tool==="rect"||tool==="circle"||tool==="line"){
    shapeStart=spt;
    if(tool==="rect"){
      shapeEl=document.createElementNS(NS,"rect");
      applyStyle(shapeEl,false);
      shapeEl.setAttribute("x",spt.x); shapeEl.setAttribute("y",spt.y);
      shapeEl.setAttribute("width","0"); shapeEl.setAttribute("height","0");
    } else if(tool==="circle"){
      shapeEl=document.createElementNS(NS,"ellipse");
      applyStyle(shapeEl,false);
      shapeEl.setAttribute("cx",spt.x); shapeEl.setAttribute("cy",spt.y);
      shapeEl.setAttribute("rx","0"); shapeEl.setAttribute("ry","0");
    } else {
      shapeEl=document.createElementNS(NS,"line");
      applyStyle(shapeEl,false);
      shapeEl.setAttribute("x1",spt.x); shapeEl.setAttribute("y1",spt.y);
      shapeEl.setAttribute("x2",spt.x); shapeEl.setAttribute("y2",spt.y);
    }
    drawLayer.insertBefore(shapeEl, penPrev);
    return;
  }

  if(tool==="fill"){
    var fhit=elAtPt(pt);
    if(fhit){ fhit.setAttribute("fill",fgCol); schedTex(); }
    return;
  }

  if(tool==="eyedropper"){
    var ehit=elAtPt(pt);
    if(ehit){
      var fc=ehit.getAttribute("fill");
      if(fc&&fc!=="none"){ fgCol=fc; updSwatches(); }
      var sc=ehit.getAttribute("stroke");
      if(sc&&sc!=="none"){ bgCol=sc; updSwatches(); }
    }
    return;
  }
}

function onMove(e){
  var pt=svgPt(e), spt=snapP(pt);

  if(tool==="select"&&selDrag&&selectedEl){
    var dx=pt.x-selDragStart.x, dy=pt.y-selDragStart.y;
    moveEl(selectedEl, dx, dy, selDragStart, selDragBB);
    selDragStart=pt;
    try{ selDragBB=selectedEl.getBBox(); }catch(er){}
    updSelBox(); schedTex(); return;
  }

  if(tool==="pen"&&penDown&&penPts.length>0){
    var last=penPts[penPts.length-1];
    var dx=spt.x-penDownPt.x, dy=spt.y-penDownPt.y;
    last.cpx2=last.x+dx; last.cpy2=last.y+dy;
    updPenPreview(spt); return;
  }
  if(tool==="pen"&&!penDown&&penPts.length>0){ updPenPreview(spt); return; }

  if(tool==="brush"&&brushEl&&brushPts.length>0){
    brushPts.push(pt);
    var d="M "+brushPts[0].x+","+brushPts[0].y;
    for(var bi=1;bi<brushPts.length;bi++){ d+=" L "+brushPts[bi].x+","+brushPts[bi].y; }
    brushEl.setAttribute("d",d); return;
  }

  if(shapeStart&&shapeEl){
    var ex=spt.x, ey=spt.y;
    if(tool==="rect"){
      var rx=Math.min(shapeStart.x,ex), ry=Math.min(shapeStart.y,ey);
      var rw=Math.abs(ex-shapeStart.x), rh=Math.abs(ey-shapeStart.y);
      shapeEl.setAttribute("x",rx); shapeEl.setAttribute("y",ry);
      shapeEl.setAttribute("width",rw); shapeEl.setAttribute("height",rh);
    } else if(tool==="circle"){
      var cdrx=Math.abs(ex-shapeStart.x), cdry=Math.abs(ey-shapeStart.y);
      if(e.shiftKey){ cdrx=cdry=Math.min(cdrx,cdry); }
      shapeEl.setAttribute("rx",cdrx); shapeEl.setAttribute("ry",cdry);
    } else if(tool==="line"){
      shapeEl.setAttribute("x2",ex); shapeEl.setAttribute("y2",ey);
    }
  }
}

function onUp(e){
  if(e.button!==0) return;
  var pt=svgPt(e), spt=snapP(pt);

  if(tool==="select"){ selDrag=false; selDragStart=null; selDragBB=null; return; }

  if(tool==="pen"&&penDown){
    penDown=false;
    var last=penPts[penPts.length-1];
    var dx=spt.x-penDownPt.x, dy=spt.y-penDownPt.y;
    last.cpx2=last.x+dx; last.cpy2=last.y+dy;
    penPts.push({x:spt.x,y:spt.y,cpx:spt.x-dx,cpy:spt.y-dy,cpx2:spt.x,cpy2:spt.y});
    updPenPreview(spt); return;
  }

  if(tool==="brush"&&brushEl){
    if(brushPts.length>1){
      elements.push({el:brushEl,type:"brush"});
      schedTex();
    } else {
      if(brushEl.parentNode) brushEl.parentNode.removeChild(brushEl);
    }
    brushEl=null; brushPts=[]; return;
  }

  if(shapeStart&&shapeEl){
    var tw=parseFloat(shapeEl.getAttribute("width")||shapeEl.getAttribute("rx")||0);
    var th=parseFloat(shapeEl.getAttribute("height")||shapeEl.getAttribute("ry")||0);
    var tl=Math.abs(parseFloat(shapeEl.getAttribute("x2")||0)-parseFloat(shapeEl.getAttribute("x1")||0));
    var tll=Math.abs(parseFloat(shapeEl.getAttribute("y2")||0)-parseFloat(shapeEl.getAttribute("y1")||0));
    var valid=(tw>2||th>2)||(tl>2||tll>2);
    if(valid){
      elements.push({el:shapeEl,type:tool});
      schedTex();
    } else {
      if(shapeEl.parentNode) shapeEl.parentNode.removeChild(shapeEl);
    }
    shapeStart=null; shapeEl=null;
  }
}

function onDbl(e){
  if(tool==="pen") commitPen();
}

function moveEl(el, dx, dy, fromPt, fromBB){
  var type=elements.find(function(e){ return e.el===el; });
  var t=type?type.type:"";
  if(t==="rect"){
    el.setAttribute("x",parseFloat(el.getAttribute("x")||0)+dx);
    el.setAttribute("y",parseFloat(el.getAttribute("y")||0)+dy);
  } else if(t==="circle"){
    el.setAttribute("cx",parseFloat(el.getAttribute("cx")||0)+dx);
    el.setAttribute("cy",parseFloat(el.getAttribute("cy")||0)+dy);
  } else if(t==="line"){
    el.setAttribute("x1",parseFloat(el.getAttribute("x1")||0)+dx);
    el.setAttribute("y1",parseFloat(el.getAttribute("y1")||0)+dy);
    el.setAttribute("x2",parseFloat(el.getAttribute("x2")||0)+dx);
    el.setAttribute("y2",parseFloat(el.getAttribute("y2")||0)+dy);
  } else {
    var cur=el.getAttribute("transform")||"";
    var match=cur.match(/translate\(([^,]+),([^)]+)\)/);
    var tx=match?parseFloat(match[1]):0;
    var ty=match?parseFloat(match[2]):0;
    el.setAttribute("transform","translate("+(tx+dx)+","+(ty+dy)+")");
  }
}

var offCanvas=document.createElement("canvas");
offCanvas.width=TEX; offCanvas.height=TEX;

function rebuildTex(){
  texDirty=false;
  // serialize drawing layer
  var svgStr='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">';
  Array.from(drawLayer.children).forEach(function(child){

}

// ── WebGL2 ────────────────────────────────────────────────────────────────────
var gl=null, prog=null, tex=null, vao=null;
var uLocs={};

var VS=`#version 300 es
in vec2 aPos;
out vec2 vUV;
void main(){
  vUV=aPos*.5+.5;
  gl_Position=vec4(aPos,0,1);
}`;

var FS=`#version 300 es
precision highp float;
in vec2 vUV;
out vec4 fragColor;

uniform sampler2D uTex;
uniform vec2 uRes;
uniform vec3 uLightDir;
uniform float uLI;
uniform float uAmb;
uniform int uMeshType;
uniform float uMeshSz;
uniform float uMeshOp;
uniform int uRenderMode;
uniform vec3 uShadowColor;
uniform int uTileMode;
uniform int uTileCnt;
uniform bool uGridOv;
uniform vec3 uBgColor;

// ── tiling ──
vec2 tileUV(vec2 uv){
  float n=float(uTileCnt);
  uv*=n;
  vec2 cell=floor(uv);
  vec2 frac=fract(uv);
  float ci=cell.x, ri=cell.y;

  // repeat
  if(uTileMode==0){
    return frac;
  }
  // brick
  if(uTileMode==1){
    float off=mod(ri,2.0)*0.5;
    return vec2(fract(frac.x+off), frac.y);
  }
  // mirror
  if(uTileMode==2){
    float mx=mod(ci,2.0)<1.0?frac.x:1.0-frac.x;
    float my=mod(ri,2.0)<1.0?frac.y:1.0-frac.y;
    return vec2(mx,my);
  }
  // rot90
  if(uTileMode==3){
    int rot=int(mod(ci+ri*n,4.0));
    vec2 fc=frac-0.5;
    if(rot==0) return fc+0.5;
    if(rot==1) return vec2(-fc.y,fc.x)+0.5;
    if(rot==2) return vec2(-fc.x,-fc.y)+0.5;
    return vec2(fc.y,-fc.x)+0.5;
  }
  // hex
  if(uTileMode==4){
    uv=vUV*n;
    float row=floor(uv.y/0.866);
    float off2=mod(row,2.0)*0.5;
    float col=floor(uv.x-off2);
    vec2 fc2=vec2(fract(uv.x-off2), fract(uv.y/0.866));
    return fc2;
  }
  return frac;
}

// ── mesh patterns ──
float hexGrid(vec2 p, float sz){
  p/=sz;
  float q=p.x*2.0/1.732, r=-p.x/1.732+p.y;
  vec2 gi=floor(vec2(q,r));
  float d=1e9;
  for(int dx=-1;dx<=1;dx++){
    for(int dy=-1;dy<=1;dy++){
      vec2 g=gi+vec2(float(dx),float(dy));
      float cx=(g.x+g.y*0.5)*1.732, cy=g.y;
      float dist=length(p-vec2(cx,cy));
      float r2=0.9;
      d=min(d,abs(dist-r2));
    }
  }
  return smoothstep(0.06,0.0,d);
}
float sqGrid(vec2 p, float sz){
  vec2 g=abs(fract(p/sz)-.5);
  float line=min(g.x,g.y);
  return smoothstep(0.05,0.0,line);
}
float dotGrid(vec2 p, float sz){
  vec2 g=fract(p/sz)-.5;
  return smoothstep(0.18,0.12,length(g));
}

// ── normal map via Sobel ──
vec3 calcN(vec2 uv){
  float px=1.0/512.0;
  float tl=texture(uTex,uv+vec2(-px,-px)).a;
  float tc=texture(uTex,uv+vec2(0,-px)).a;
  float tr=texture(uTex,uv+vec2(px,-px)).a;
  float ml=texture(uTex,uv+vec2(-px,0)).a;
  float mr=texture(uTex,uv+vec2(px,0)).a;
  float bl=texture(uTex,uv+vec2(-px,px)).a;
  float bc=texture(uTex,uv+vec2(0,px)).a;
  float br=texture(uTex,uv+vec2(px,px)).a;
  float sx=tr+2.0*mr+br-tl-2.0*ml-bl;
  float sy=bl+2.0*bc+br-tl-2.0*tc-tr;
  return normalize(vec3(-sx*3.0,-sy*3.0,1.0));
}

void main(){
  vec2 tuv=tileUV(vUV);
  vec4 texCol=texture(uTex,tuv);
  vec2 worldPx=vUV*uRes;
  float meshV=0.0;

  // render modes
  if(uRenderMode==0){
    // flat
    vec3 col=texCol.rgb;
    if(texCol.a<0.01) col=uBgColor;
    fragColor=vec4(col,1);
  } else if(uRenderMode==1){
    // lace
    if(uMeshType==0) meshV=hexGrid(worldPx,uMeshSz);
    else if(uMeshType==1) meshV=sqGrid(worldPx,uMeshSz);
    else if(uMeshType==2) meshV=dotGrid(worldPx,uMeshSz);
    vec3 N=calcN(tuv);
    vec3 L=normalize(uLightDir);
    float diff=max(dot(N,L),0.0);
    vec3 H=normalize(L+vec3(0,0,1));
    float spec=pow(max(dot(N,H),0.0),40.0);
    float light=uAmb+diff*uLI+spec*uLI*0.3;
    vec3 col=texCol.rgb*light;
    if(texCol.a<0.01){
      col=uBgColor*(uAmb+meshV*uMeshOp);
    }
    fragColor=vec4(col,1);
  } else if(uRenderMode==2){
    // emboss
    vec3 N=calcN(tuv);
    vec3 L=normalize(uLightDir);
    float diff=max(dot(N,L),0.0)*2.0;
    float dark=max(dot(N,-L),0.0)*0.5;
    float light=uAmb+diff*uLI-dark;
    vec3 col=texCol.rgb*light;
    if(texCol.a<0.01) col=uBgColor*light;
    fragColor=vec4(col,1);
  } else {
    // shadow
    vec2 off=vec2(3.0/uRes.x,3.0/uRes.y)*4.0;
    float shA=0.0;
    for(int si=-2;si<=2;si++){
      for(int sj=-2;sj<=2;sj++){
        vec2 suv=tileUV(vUV+off+vec2(float(si),float(sj))*off*0.5);
        shA+=texture(uTex,suv).a;
      }
    }
    shA/=25.0;
    vec3 col=texCol.rgb;
    if(texCol.a<0.01){
      col=mix(uBgColor, uShadowColor, shA*0.7);
    }
    fragColor=vec4(col,1);
  }

  // grid overlay
  if(uGridOv){
    float n=float(uTileCnt);
    vec2 gv=abs(fract(vUV*n)-.5);
    float gl2=min(gv.x,gv.y);
    // 1px line in UV space = 1/(n * resolution)
    float lineW = 1.0/(n*min(uRes.x,uRes.y));
    float gline=smoothstep(lineW*2.0,0.0,gl2);
    fragColor.rgb=mix(fragColor.rgb,vec3(0.5,0.4,0.9),gline*0.6);
  }
}`;

function initGL(){
  gl=glCanvas.getContext("webgl2",{preserveDrawingBuffer:true,antialias:true});
  if(!gl){ console.error("WebGL2 not available"); return; }

  function compileShader(type,src){
    var s=gl.createShader(type);
    gl.shaderSource(s,src);
    gl.compileShader(s);
    if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){ console.error(gl.getShaderInfoLog(s)); return null; }
    return s;
  }

  var vs=compileShader(gl.VERTEX_SHADER,VS);
  var fs=compileShader(gl.FRAGMENT_SHADER,FS);
  prog=gl.createProgram();
  gl.attachShader(prog,vs); gl.attachShader(prog,fs);
  gl.linkProgram(prog);
  if(!gl.getProgramParameter(prog,gl.LINK_STATUS)){ console.error(gl.getProgramInfoLog(prog)); return; }

  // fullscreen quad
  var buf=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  vao=gl.createVertexArray();
  gl.bindVertexArray(vao);
  var aPos=gl.getAttribLocation(prog,"aPos");
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos,2,gl.FLOAT,false,0,0);

  // uniforms
  var names=["uTex","uRes","uLightDir","uLI","uAmb","uMeshType","uMeshSz","uMeshOp","uRenderMode","uShadowColor","uTileMode","uTileCnt","uGridOv","uBgColor"];
  names.forEach(function(n){ uLocs[n]=gl.getUniformLocation(prog,n); });

  // texture
  tex=gl.createTexture();
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  // blank texture
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,TEX,TEX,0,gl.RGBA,gl.UNSIGNED_BYTE,null);

  renderGL();
}

function uploadTex(){
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,offCanvas);
}

function hexCol(h){
  var r=parseInt(h.slice(1,3),16)/255;
  var g=parseInt(h.slice(3,5),16)/255;
  var b=parseInt(h.slice(5,7),16)/255;
  return [r,g,b];
}

function renderGL(){
  if(!gl||!prog) return;
  var pw=glCanvas.width, ph=glCanvas.height;
  if(pw<1||ph<1) return;
  gl.viewport(0,0,pw,ph);
  gl.useProgram(prog);
  gl.bindVertexArray(vao);
  gl.activeTexture(gl.TEXTURE0);
  gl.bindTexture(gl.TEXTURE_2D,tex);
  gl.uniform1i(uLocs.uTex,0);
  gl.uniform2f(uLocs.uRes,pw,ph);

  var tileMap={repeat:0,brick:1,mirror:2,rot90:3,hex:4};
  gl.uniform1i(uLocs.uTileMode,tileMap[tilingMode]||0);
  gl.uniform1i(uLocs.uTileCnt,tilingCnt);
  gl.uniform1i(uLocs.uRenderMode,renderMode);
  gl.uniform1i(uLocs.uMeshType,meshType);
  gl.uniform1f(uLocs.uMeshSz,meshSz);
  gl.uniform1f(uLocs.uMeshOp,meshOp);
  gl.uniform1i(uLocs.uGridOv,gridOv?1:0);

  var lz=lightH;
  var len=Math.sqrt(lightX*lightX+lightY*lightY+lz*lz);
  gl.uniform3f(uLocs.uLightDir,lightX/len,lightY/len,lz/len);
  gl.uniform1f(uLocs.uLI,lightI);
  gl.uniform1f(uLocs.uAmb,lightA);

  var sc=shadowCol;
  gl.uniform3f(uLocs.uShadowColor,sc[0],sc[1],sc[2]);

  var bgc=hexCol(document.getElementById("bg-col").value||"#0e0e18");
  gl.uniform3f(uLocs.uBgColor,bgc[0],bgc[1],bgc[2]);

  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}

(function(){
  var dragging=false;
  var globe=document.getElementById("globe-bg");
  var dot=document.getElementById("light-dot");
  function setLightFromDot(x,y){
    var r=globe.getBoundingClientRect();
    var cx=r.left+r.width/2, cy=r.top+r.height/2;
    var rad=r.width/2-8;
    var dx=x-cx, dy=y-cy;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>rad){ dx=dx/dist*rad; dy=dy/dist*rad; }
    dot.style.left=(cx+dx-r.left)+"px";
    dot.style.top=(cy+dy-r.top)+"px";
    lightX=dx/rad; lightY=dy/rad;
    renderGL();
  }
  dot.addEventListener("mousedown",function(e){ dragging=true; e.preventDefault(); });
  window.addEventListener("mousemove",function(e){ if(dragging) setLightFromDot(e.clientX,e.clientY); });
  window.addEventListener("mouseup",function(){ dragging=false; });
  globe.addEventListener("click",function(e){ setLightFromDot(e.clientX,e.clientY); });
})();

// ── resize ──
var resizeObs=new ResizeObserver(function(entries){
  for(var entry of entries){
    var cr=entry.contentRect;
    var dpr=Math.min(window.devicePixelRatio||1,2);
    var pw=Math.max(1,cr.width*dpr|0), ph=Math.max(1,cr.height*dpr|0);
    if(glCanvas.width!==pw||glCanvas.height!==ph){
      glCanvas.width=pw; glCanvas.height=ph;
    }
    glCanvas.style.width=cr.width+'px'; glCanvas.style.height=cr.height+'px';
  }
  renderGL();
});
resizeObs.observe(glCanvas);

// ── init ──
initGL();
schedTex();
// (balance
})();
</script>
